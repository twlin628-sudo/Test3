<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>JUNGLE — 叢林求生</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --g:#39ff6e;--gd:#22cc50;
  --a:#ffcc00;--r:#ff3355;--b:#33ccff;--p:#bb88ff;--o:#ff8833;
  --bg:#050f07;--bg2:#091508;--bg3:#0d1e0e;
  --bd:#1c3820;--bd2:#2a5030;
  --t:#b8ffcc;--td:#5a9a6a;--tx:#253a28;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--t);
  font-family:'Share Tech Mono',monospace;font-size:15px;
  display:flex;flex-direction:column;
  max-width:393px;margin:0 auto;height:100dvh;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
body::before{
  content:'';position:fixed;inset:0;max-width:393px;margin:0 auto;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,80,0.018) 3px,rgba(0,255,80,0.018) 4px);
  pointer-events:none;z-index:900;
}
#hdr{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bd);padding:8px 12px 7px;}
#hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
#gtitle{font-family:'VT323',monospace;font-size:26px;color:var(--g);letter-spacing:4px;line-height:1;}
#hdr-right{text-align:right;}
#datetime{font-size:12px;color:var(--td);line-height:1.5;}
#weather-line{font-size:12px;color:var(--b);line-height:1.5;}
#shelter-wrap{margin-bottom:6px;}
#shelter-label{display:flex;justify-content:space-between;font-size:11px;color:var(--td);margin-bottom:3px;}
#shelter-bar{height:5px;background:var(--bd);border-radius:3px;overflow:hidden;}
#shelter-fill{height:100%;background:linear-gradient(90deg,var(--gd),var(--a));border-radius:3px;transition:width 0.5s;}
#stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 12px;}
.sm{display:flex;flex-direction:column;gap:2px;}
.sm-top{display:flex;justify-content:space-between;font-size:12px;}
.sml{color:var(--td);}.smv{color:var(--t);font-weight:500;}
.sbar{height:5px;background:var(--bd);border-radius:2px;overflow:hidden;}
.sf{height:100%;border-radius:2px;transition:width 0.3s;}
.hp{background:var(--r);}.hun{background:var(--a);}.thi{background:var(--b);}.slp{background:var(--p);}
#log{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 13px 6px;-webkit-overflow-scrolling:touch;}
#log::-webkit-scrollbar{width:2px;}
#log::-webkit-scrollbar-thumb{background:var(--bd2);}
.ll{line-height:1.85;font-size:15px;word-break:break-all;}
.li{color:var(--t);}.lw{color:var(--a);}.ld{color:var(--r);}
.ls{color:var(--g);}.lm{color:var(--td);}.lx{color:var(--b);}
.lp{color:var(--bd2);user-select:none;}.lo{color:var(--o);}.lb{color:#ff44ff;}
#loc-bar{flex-shrink:0;background:var(--bg3);border-bottom:1px solid var(--bd);padding:5px 12px;display:flex;align-items:center;justify-content:space-between;font-size:12px;}
#loc-left{display:flex;align-items:center;gap:8px;}
#loc-name{color:var(--td);}#loc-coord{color:var(--tx);font-size:11px;}
#loc-res-wrap{display:flex;align-items:center;gap:6px;}
#loc-res-bar-outer{width:60px;height:5px;background:var(--bd);border-radius:3px;overflow:hidden;}
#loc-res-bar-inner{height:100%;border-radius:3px;transition:width 0.4s;}
#loc-res-label{font-size:11px;color:var(--td);min-width:52px;text-align:right;}
#tabs{flex-shrink:0;display:flex;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);background:var(--bg2);}
.tab{flex:1;padding:7px 0;text-align:center;font-size:12px;color:var(--td);cursor:pointer;border-right:1px solid var(--bd);transition:all 0.15s;}
.tab:last-child{border-right:none;}
.tab.active{color:var(--g);background:var(--bg3);}
.panel{display:none;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--bd);}
.panel.active{display:block;}
#inv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;max-height:110px;overflow-y:auto;}
.inv-cell{background:var(--bg3);border:1px solid var(--bd);padding:5px 6px;font-size:11px;border-radius:3px;display:flex;justify-content:space-between;align-items:center;}
.ic-n{color:var(--t);}.ic-q{color:var(--a);font-size:12px;}
#eq-wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;}
.eq-slot{background:var(--bg3);border:1px solid var(--bd);padding:5px 8px;border-radius:3px;}
.eq-l{font-size:10px;color:var(--td);}.eq-v{font-size:13px;color:var(--a);}
#rec-list{max-height:115px;overflow-y:auto;}
.ri{display:grid;grid-template-columns:14px 68px 1fr;gap:4px;align-items:baseline;padding:3px 0;border-bottom:1px solid var(--bd);font-size:12px;line-height:1.7;}
.ri:last-child{border-bottom:none;}
.rc{color:var(--g);}.rn2{color:var(--tx);}.rnm{color:var(--t);}
.ri-right{display:flex;flex-direction:column;}
.rnd{color:var(--td);font-size:10px;}.rpu{color:var(--o);font-size:10px;}
#shelter-detail{font-size:13px;line-height:1.9;}
.sh-stage{padding:4px 0;border-bottom:1px solid var(--bd);display:flex;gap:8px;align-items:flex-start;}
.sh-done{color:var(--g);}.sh-next{color:var(--a);}.sh-lock{color:var(--tx);}
.sh-name{min-width:70px;}.sh-need{font-size:11px;color:var(--td);flex:1;}
/* 上一個指令快捷顯示 */
#last-cmd-bar{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bd);padding:4px 12px;display:flex;align-items:center;gap:8px;font-size:11px;}
#last-cmd-label{color:var(--tx);}
#last-cmd-val{color:var(--td);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#last-cmd-btn{background:var(--bg3);border:1px solid var(--bd);color:var(--g);font-family:'Share Tech Mono',monospace;font-size:11px;padding:2px 10px;cursor:pointer;border-radius:2px;flex-shrink:0;}
#last-cmd-btn:active{background:var(--bd2);}
#inp-area{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-top:1px solid var(--bd);}
#inp-prompt{color:var(--g);font-size:18px;line-height:1;}
#inp{flex:1;background:transparent;border:none;outline:none;color:var(--g);font-family:'Share Tech Mono',monospace;font-size:15px;caret-color:var(--g);min-width:0;padding:4px 0;}
#inp::placeholder{color:var(--tx);}
#inp-btn{background:var(--bg3);border:1px solid var(--bd2);color:var(--td);font-family:'Share Tech Mono',monospace;font-size:13px;padding:5px 12px;cursor:pointer;border-radius:3px;flex-shrink:0;}
#inp-btn:active{background:var(--bd2);}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:999;align-items:center;justify-content:center;max-width:393px;margin:0 auto;}
#modal.show{display:flex;}
#mbox{background:var(--bg2);border:1px solid var(--gd);padding:24px 20px;width:90%;font-size:14px;line-height:2;}
#mtitle{font-family:'VT323',monospace;font-size:28px;color:var(--g);margin-bottom:12px;letter-spacing:2px;}
#mbody{color:var(--t);margin-bottom:16px;}
#mclose{background:transparent;border:1px solid var(--gd);color:var(--g);font-family:'Share Tech Mono',monospace;font-size:14px;padding:6px 0;cursor:pointer;width:100%;}
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-top">
    <div id="gtitle">JUNGLE</div>
    <div id="hdr-right">
      <div id="datetime">第1天 06:00</div>
      <div id="weather-line">☀ 晴天</div>
    </div>
  </div>
  <div id="shelter-wrap">
    <div id="shelter-label"><span id="shelter-stage-name">避難所: 未建造</span><span id="shelter-pct">0%</span></div>
    <div id="shelter-bar"><div id="shelter-fill" style="width:0%"></div></div>
  </div>
  <div id="stats-row">
    <div class="sm"><div class="sm-top"><span class="sml">生命</span><span class="smv" id="v-hp">100</span></div><div class="sbar"><div class="sf hp" id="b-hp" style="width:100%"></div></div></div>
    <div class="sm"><div class="sm-top"><span class="sml">飢餓</span><span class="smv" id="v-hun">100</span></div><div class="sbar"><div class="sf hun" id="b-hun" style="width:100%"></div></div></div>
    <div class="sm"><div class="sm-top"><span class="sml">口渴</span><span class="smv" id="v-thi">100</span></div><div class="sbar"><div class="sf thi" id="b-thi" style="width:100%"></div></div></div>
    <div class="sm"><div class="sm-top"><span class="sml">睡眠</span><span class="smv" id="v-slp">100</span></div><div class="sbar"><div class="sf slp" id="b-slp" style="width:100%"></div></div></div>
  </div>
</div>

<div id="loc-bar">
  <div id="loc-left"><span id="loc-name">✈ 墜機殘骸</span><span id="loc-coord">(5,5)</span></div>
  <div id="loc-res-wrap">
    <div id="loc-res-bar-outer"><div id="loc-res-bar-inner" style="width:100%"></div></div>
    <span id="loc-res-label">資源充足</span>
  </div>
</div>

<!-- 上一個指令快捷列 -->
<div id="last-cmd-bar">
  <span id="last-cmd-label">上次:</span>
  <span id="last-cmd-val">—</span>
  <button id="last-cmd-btn" onclick="repeatLastCmd()">!! 重複</button>
</div>

<div id="log"></div>

<div id="tabs">
  <div class="tab active" onclick="switchTab('inv')">背包</div>
  <div class="tab" onclick="switchTab('eq')">裝備</div>
  <div class="tab" onclick="switchTab('rec')">配方</div>
  <div class="tab" onclick="switchTab('shlt')">避難所</div>
</div>
<div id="panel-inv"  class="panel active"><div id="inv-grid"></div></div>
<div id="panel-eq"   class="panel"><div id="eq-wrap"></div></div>
<div id="panel-rec"  class="panel"><div id="rec-list"></div></div>
<div id="panel-shlt" class="panel"><div id="shelter-detail"></div></div>

<div id="inp-area">
  <span id="inp-prompt">&gt;</span>
  <input id="inp" type="text" placeholder="輸入指令... (? 說明)" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
  <button id="inp-btn" onclick="submitCmd()">送出</button>
</div>

<div id="modal">
  <div id="mbox">
    <div id="mtitle"></div>
    <div id="mbody"></div>
    <button id="mclose" onclick="closeModal()">[ 確認 ]</button>
  </div>
</div>

<script>
// ═══════════════════════════════════
// TERRAIN
// ═══════════════════════════════════
const TR={
  jungle:{ch:'T',lb:'雨林',    icon:'🌿',maxRes:8, regenDays:2, res:['原木','棕櫚葉','藤蔓','野果','藥草','樹皮','原木','藤蔓','蘑菇'],desc:'巨木參天，藤蔓纏繞，叫聲四起。'},
  bamboo:{ch:'%',lb:'竹林',    icon:'🎋',maxRes:6, regenDays:3, res:['竹子','竹子','竹子','藤蔓','樹皮'],desc:'翠綠竹林沙沙作響，清涼宜人。'},
  hill:  {ch:'^',lb:'山坡',    icon:'⛰', maxRes:5, regenDays:4, res:['石頭','石頭','燧石','骨頭','石頭'],desc:'岩石裸露，視野開闊。'},
  swamp: {ch:'*',lb:'沼澤',    icon:'🌊',maxRes:6, regenDays:2, res:['黏土','黏土','蘆薈','藥草','黏土'],desc:'陰暗泥濘，蟲鳴不絕。'},
  river: {ch:'~',lb:'河流',    icon:'💧',maxRes:999,regenDays:0,res:['魚','魚','石頭'],desc:'湍急清澈，可取水和捕魚。'},
  clear: {ch:'.',lb:'空地',    icon:'🌱',maxRes:4, regenDays:2, res:['野果','香蕉','蘆薈','野果'],desc:'開闊地帶，適合建造避難所。'},
  wreck: {ch:'#',lb:'墜機殘骸',icon:'✈', maxRes:10,regenDays:5, res:['金屬碎片','電線','防水布','急救包','金屬碎片','電線'],desc:'扭曲機身散落各處，每隔數天仍可發現新的物資。'},
  boss:  {ch:'B',lb:'BOSS領地',icon:'💀',maxRes:0, regenDays:0, res:[],desc:'這裡瀰漫著危險的氣息，叢林巨獸就在附近。'},
};

const MAP_W=11,MAP_H=11;
const DIR_DELTA={n:[0,1],s:[0,-1],e:[1,0],w:[-1,0],north:[0,1],south:[0,-1],east:[1,0],west:[-1,0]};
const DIR_NAME={n:'北',s:'南',e:'東',w:'西',north:'北',south:'南',east:'東',west:'西'};

const BOSS_MAX_HP=220,BOSS_ATK=22,BOSS_ATK_RAGE=32,BOSS_DEF=12,BOSS_RAGE_HP=80,BOSS_INFECT=0.3;

const STAGES=[
  {id:0,name:'未建造',    needs:{},                                           bonus:''},
  {id:1,name:'臨時遮蔽',  needs:{棕櫚葉:6,樹枝:4,繩索:2},                    bonus:'睡眠品質大幅提升'},
  {id:2,name:'基礎木屋',  needs:{原木:10,竹子:6,藤蔓:4,繩索:2},              bonus:'夜間防獸效果提升'},
  {id:3,name:'強化結構',  needs:{原木:15,石頭:8,黏土:6,骨釘:4},              bonus:'完全防止夜間獸襲'},
  {id:4,name:'生活設施',  needs:{原木:10,金屬碎片:4,竹子:6,繩索:3},          bonus:'陷阱捕獵效率提升'},
  {id:5,name:'求救信號台',needs:{金屬碎片:8,電線:3,防水布:2,繩索:4},         bonus:'持續發送求救信號'},
  {id:6,name:'永久營地',  needs:{原木:15,獸骨核心:1,繩索:6,金屬碎片:4},      bonus:'觸發救援結局！（需第30天）'},
];

const NEED_FIRE=new Set(['烤肉','烤魚','蘑菇湯']);
const WEAPON_ITEMS=new Set(['燧石刀','竹矛','石斧','金屬刀']);
const ARMOR_ITEMS =new Set(['棕葉甲','竹甲','獸皮甲','防水披風']);

const RECIPES={
  '繩索':    {needs:{藤蔓:3},                  gives:{繩索:2},     type:'material', purpose:'建造避難所、武器防具必備'},
  '骨釘':    {needs:{骨頭:2},                  gives:{骨釘:3},     type:'material', purpose:'避難所第3階段建造用'},
  '樹枝':    {needs:{原木:1},                  gives:{樹枝:3},     type:'material', purpose:'避難所第1階段、火堆原料'},
  '木桶':    {needs:{原木:3},                  gives:{木桶:1},     type:'tool',     purpose:'永久取水容器，持有才能用 co 收集水'},
  '燧石刀':  {needs:{燧石:2,樹枝:1},            gives:{燧石刀:1},   type:'weapon',   atk:7,  purpose:'早期武器 ATK+7，eq 裝備'},
  '竹矛':    {needs:{竹子:2,繩索:1},             gives:{竹矛:1},     type:'weapon',   atk:10, purpose:'中期武器 ATK+10，eq 裝備'},
  '石斧':    {needs:{石頭:2,原木:1,繩索:1},      gives:{石斧:1},     type:'weapon',   atk:13, purpose:'重型武器 ATK+13，eq 裝備'},
  '金屬刀':  {needs:{金屬碎片:2,繩索:1},         gives:{金屬刀:1},   type:'weapon',   atk:18, purpose:'最強武器 ATK+18，eq 裝備'},
  '棕葉甲':  {needs:{棕櫚葉:6,繩索:3},           gives:{棕葉甲:1},   type:'armor',    def:4,  purpose:'植物防具 DEF+4，eq 裝備'},
  '竹甲':    {needs:{竹子:5,繩索:4},              gives:{竹甲:1},     type:'armor',    def:8,  purpose:'竹片鎧甲 DEF+8，eq 裝備'},
  '獸皮甲':  {needs:{獸皮:4,繩索:3},              gives:{獸皮甲:1},   type:'armor',    def:12, purpose:'皮革防具 DEF+12，eq 裝備'},
  '防水披風':{needs:{防水布:1,繩索:2},             gives:{防水披風:1}, type:'armor',    def:3,  purpose:'輕量防具 DEF+3，eq 裝備'},
  '火堆':    {needs:{原木:3,燧石:1,樹枝:3},       gives:{火堆:1},     type:'build',    purpose:'烹飪食物，提升睡眠品質'},
  '竹水管':  {needs:{竹子:3},                     gives:{竹水管:1},   type:'tool',     purpose:'持有時在河邊 co 取水×3，無感染風險'},
  '陷阱':    {needs:{樹枝:4,繩索:2,電線:1},       gives:{陷阱:1},     type:'build',    purpose:'每天自動捕獵，回到陷阱位置 co 取得'},
  // 醫療站：在其所在格使用急救藥，HP回復從+30提升至+50
  '醫療站':  {needs:{金屬碎片:2,繩索:3,棕櫚葉:4}, gives:{醫療站:1},  type:'build',    purpose:'建造後在此格使用急救藥，效果提升至 HP+50'},
  '烤肉':    {needs:{野豬肉:1},                   gives:{烤肉:1},     type:'food_item',hunger:65,thirst:0,  purpose:'需要火堆。飢餓+65'},
  '烤魚':    {needs:{魚:1},                      gives:{烤魚:1},      type:'food_item',hunger:50,thirst:10, purpose:'需要火堆。飢餓+50，口渴+10'},
  '蘑菇湯':  {needs:{蘑菇:2,水:1},                gives:{蘑菇湯:1},   type:'food_item',hunger:45,thirst:25, purpose:'需要火堆。飢餓+45，口渴+25'},
  '繃帶':    {needs:{樹皮:2,繩索:1},              gives:{繃帶:2},     type:'medical',  purpose:'u 治療，HP+12，清感染'},
  '急救藥':  {needs:{藥草:2,蘆薈:1},              gives:{急救藥:1},   type:'medical',  purpose:'u 使用，HP+30（有醫療站時 HP+50），清感染'},
};

const EDIBLE={
  野果:  {hunger:20,thirst:8},
  香蕉:  {hunger:30,thirst:10},
  烤肉:  {hunger:65,thirst:0},
  烤魚:  {hunger:50,thirst:10},
  蘑菇湯:{hunger:45,thirst:25},
};

// 醫療站加成：在醫療站所在格使用急救藥，回復量提升
function hasClinicHere(){return G.built.some(b=>b.x===G.px&&b.y===G.py&&b.type==='醫療站');}

const USABLE={
  蘆薈:   G=>{G.s.hp=cl(G.s.hp+15);log('塗抹蘆薈，HP+15','ls');},
  急救包: G=>{G.s.hp=cl(G.s.hp+50);G.infected=false;log('使用急救包，HP+50，清除感染','ls');},
  繃帶:   G=>{G.s.hp=cl(G.s.hp+12);G.infected=false;log('包紮傷口，HP+12，清感染','ls');},
  // 醫療站加成：有醫療站時 +50，沒有時 +30
  急救藥: G=>{
    const clinic=hasClinicHere();
    const heal=clinic?50:30;
    G.s.hp=cl(G.s.hp+heal);G.infected=false;
    if(clinic){log(`服用急救藥（醫療站加成！），HP+${heal}，清感染`,'ls');}
    else{log(`服用急救藥，HP+${heal}，清感染`,'ls');log('提示：在醫療站旁使用效果提升至 HP+50','lm');}
  },
  竹水管: G=>{
    if(G.map[G.py][G.px]==='river'){addItem('水',3);G.s.thirst=cl(G.s.thirst+30);log('竹水管淨化河水，取得水×3，口渴+30','ls');}
    else{log('需要在河流旁才能使用竹水管。','lw');return false;}
  },
};

let G=null;
let lastCmd=''; // 上一個有效指令

function hasFire(){return G.built.some(b=>b.x===G.px&&b.y===G.py&&b.type==='火堆');}
function hasShelter(){return G.shelterStage>=1;}
function hasBarrel(){return (G.inv['木桶']||0)>0;}
function hasTube(){return (G.inv['竹水管']||0)>0;}
function bossRage(){return G.bossHp<=BOSS_RAGE_HP&&!G.bossDefeated;}

function newGame(){
  const map=genMap();
  let sx=5,sy=5;
  for(let r=0;r<MAP_H;r++)for(let c=0;c<MAP_W;c++){if(map[r][c]==='wreck'){sx=c;sy=r;}}
  const resGrid=[];
  for(let y=0;y<MAP_H;y++){resGrid.push([]);for(let x=0;x<MAP_W;x++){const mx=TR[map[y][x]]?.maxRes||6;resGrid[y].push({cur:mx,max:mx,regenDay:0});}}
  G={
    map,resGrid,
    explored:Array.from({length:MAP_H},()=>Array(MAP_W).fill(false)),
    px:sx,py:sy,
    s:{hp:100,hunger:100,thirst:100,sleep:100},
    infected:false,
    inv:{水:3,繃帶:1},
    equipped:{weapon:null,armor:null},
    built:[],shelterStage:0,
    day:1,hour:6,minute:0,
    weather:'clear',weatherTimer:120,
    tickN:0,dead:false,won:false,
    marks:[],trapLoot:[],
    bossHp:BOSS_MAX_HP,bossDefeated:false,
  };
  lastCmd='';
  updateLastCmdBar();
  reveal(sx,sy,2);
  logSep();
  log('  JUNGLE — 叢林求生','lx');logSep();
  log('飛機墜入深山叢林，你從殘骸中爬出。','li');
  log('建造避難所，打倒叢林巨獸，撐到第30天獲救！','lo');logSep();
  log('初始物資: 水×3，繃帶×1','ls');
  log('⚠ 取水需先製作木桶 (c 木桶)。','lw');
  log('地圖上的 B 是叢林巨獸的領地，極度危險。','lb');
  log('!! 或點擊「!! 重複」可重複執行上一個指令。','lm');
  logSep();
  log('輸入 <span style="color:#39ff6e">?</span> 查看所有指令。','li');log('','li');
  descLoc();renderAll();renderLocBar();
}

function genMap(){
  const m=Array.from({length:MAP_H},()=>Array(MAP_W).fill('jungle'));
  m[5][5]='wreck';
  const types=['bamboo','bamboo','bamboo','hill','hill','swamp','swamp','river','river','clear','clear','clear'];
  for(let i=0;i<26;i++){const x=1+Math.floor(Math.random()*(MAP_W-2));const y=1+Math.floor(Math.random()*(MAP_H-2));if(!(x===5&&y===5))m[y][x]=types[Math.floor(Math.random()*types.length)];}
  let bx,by;
  do{bx=1+Math.floor(Math.random()*(MAP_W-2));by=1+Math.floor(Math.random()*(MAP_H-2));}
  while(Math.abs(bx-5)+Math.abs(by-5)<4||(bx===5&&by===5));
  m[by][bx]='boss';
  return m;
}

function reveal(x,y,r){for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){const nx=x+dx,ny=y+dy;if(nx>=0&&nx<MAP_W&&ny>=0&&ny<MAP_H)G.explored[ny][nx]=true;}}
function getCell(){return G.resGrid[G.py][G.px];}
function cellLabel(cell,t){if(t==='river')return'無限';if(t==='boss')return'—';if(cell.cur<=0)return'已耗盡';const p=cell.cur/cell.max;return p>0.6?'資源充足':p>0.3?'資源稀少':'幾乎耗盡';}
function cellColor(cell,t){if(t==='river')return'#33ccff';if(t==='boss')return'#ff44ff';if(cell.cur<=0)return'#ff3355';const p=cell.cur/cell.max;return p>0.6?'#22cc50':p>0.3?'#ffcc00':'#ff8833';}

function regenResources(){
  for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){
    const t=G.map[y][x];const td=TR[t];if(!td||td.regenDays===0)continue;
    const cell=G.resGrid[y][x];if(cell.cur<cell.max&&G.day>=cell.regenDay){cell.cur=cell.max;if(t==='wreck')log('殘骸的深處又有新物資可以發掘了！','lo');}
  }
}
function regenLabel(t,cell){if(TR[t]?.regenDays===0)return'（永久耗盡）';return`約${Math.max(1,cell.regenDay-G.day)}天後再生。`;}

function log(msg,cls='li'){const el=document.getElementById('log');const d=document.createElement('div');d.className='ll '+cls;d.innerHTML=msg;el.appendChild(d);el.scrollTop=el.scrollHeight;}
function logSep(){log('─'.repeat(32),'lp');}

// 更新上一個指令快捷列
function updateLastCmdBar(){
  document.getElementById('last-cmd-val').textContent=lastCmd||'—';
  document.getElementById('last-cmd-btn').style.opacity=lastCmd?'1':'0.4';
}

function renderAll(){renderStats();renderInv();renderEq();renderRec();renderShelter();renderLocBar();}

function renderLocBar(){
  if(!G)return;
  const t=G.map[G.py][G.px];const td=TR[t];const cell=getCell();
  const pct=t==='river'?100:t==='boss'?100:Math.max(0,cell.cur/cell.max*100);
  document.getElementById('loc-name').textContent=(td?.icon||'📍')+' '+td?.lb;
  document.getElementById('loc-coord').textContent=`(${G.px},${G.py})`;
  document.getElementById('loc-res-bar-inner').style.width=pct+'%';
  document.getElementById('loc-res-bar-inner').style.background=cellColor(cell,t);
  let label=cellLabel(cell,t);
  if(t==='boss')label=G.bossDefeated?'已討伐':(bossRage()?`狂暴! HP:${G.bossHp}`:`HP:${G.bossHp}`);
  else if(cell.cur<=0&&TR[t]?.regenDays>0)label=`${Math.max(1,cell.regenDay-G.day)}天後再生`;
  document.getElementById('loc-res-label').textContent=label;
}

function renderStats(){
  const s=G.s;
  const sb=(id,v)=>{document.getElementById('b-'+id).style.width=Math.max(0,Math.min(100,v))+'%';const el=document.getElementById('v-'+id);if(el)el.textContent=Math.round(v);};
  sb('hp',s.hp);sb('hun',s.hunger);sb('thi',s.thirst);sb('slp',s.sleep);
  const hh=String(G.hour).padStart(2,'0'),mm=String(G.minute).padStart(2,'0');
  document.getElementById('datetime').textContent=`第${G.day}天  ${hh}:${mm}${G.infected?' [感染]':''}`;
  document.getElementById('weather-line').textContent={clear:'☀ 晴天',rain:'🌧 下雨中',storm:'⛈ 熱帶暴雨',fog:'🌫 晨霧'}[G.weather]||'☀ 晴天';
  const pct=G.shelterStage/6*100;
  document.getElementById('shelter-fill').style.width=pct+'%';
  document.getElementById('shelter-pct').textContent=Math.round(pct)+'%';
  document.getElementById('shelter-stage-name').textContent='避難所: '+(STAGES[G.shelterStage]?.name||'完成');
}

function renderInv(){
  const el=document.getElementById('inv-grid');const items=Object.entries(G.inv).filter(([,v])=>v>0);
  if(!items.length){el.innerHTML='<div style="color:var(--tx);font-size:13px;padding:6px">背包是空的</div>';return;}
  el.innerHTML=items.map(([k,v])=>{
    const isEq=G.equipped.weapon===k||G.equipped.armor===k;
    return`<div class="inv-cell" style="${isEq?'border-color:var(--g)':''}"><span class="ic-n">${k}${isEq?' ✓':''}</span><span class="ic-q">×${v}</span></div>`;
  }).join('');
}

function renderEq(){
  document.getElementById('eq-wrap').innerHTML=
    [['武器',G.equipped.weapon],['防具',G.equipped.armor],['ATK',getAtk()],['DEF',getDef()]]
    .map(([l,v])=>`<div class="eq-slot"><div class="eq-l">${l}</div><div class="eq-v">${v||'—'}</div></div>`).join('');
}

function renderRec(){
  document.getElementById('rec-list').innerHTML=Object.entries(RECIPES).map(([name,rec])=>{
    const can=Object.entries(rec.needs).every(([k,v])=>(G.inv[k]||0)>=v);
    const needs=Object.entries(rec.needs).map(([k,v])=>`${k}×${v}`).join(' ');
    return`<div class="ri"><span class="${can?'rc':'rn2'}">${can?'✓':'✗'}</span><span class="rnm">${name}</span><div class="ri-right"><span class="rnd">${needs}</span><span class="rpu">${rec.purpose||''}</span></div></div>`;
  }).join('');
}

function renderShelter(){
  document.getElementById('shelter-detail').innerHTML=STAGES.map((st,i)=>{
    const done=G.shelterStage>i,next=G.shelterStage===i&&i>0;
    const cls=done?'sh-done':next?'sh-next':'sh-lock';
    const mark=done?'✓':next?'▶':'○';
    const nameStyle=i===6?'color:#ff44ff':'';
    const content=done?(st.bonus||'完成')
      :i===0?'（起始狀態）'
      :Object.entries(st.needs).map(([k,v])=>{
        const have=Math.min(G.inv[k]||0,v);
        const col=k==='獸骨核心'?'color:#ff44ff':'';
        return`<span style="${col}">${k}×${v}(${have})</span>`;
      }).join(' ');
    return`<div class="sh-stage"><span class="${cls}">${mark}</span><span class="sh-name ${cls}" style="${nameStyle}">${st.name}</span><span class="sh-need">${content}</span></div>`;
  }).join('');
}

function switchTab(name){
  ['inv','eq','rec','shlt'].forEach((n,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',n===name);
    document.getElementById('panel-'+n).classList.toggle('active',n===name);
  });
}

// ═══════════════════════════════════
// HELPERS
// ═══════════════════════════════════
function cl(v,mn=0,mx=100){return Math.max(mn,Math.min(mx,v));}
function addItem(k,v){if(G)G.inv[k]=(G.inv[k]||0)+v;}
function remItem(k,v){if(G)G.inv[k]=Math.max(0,(G.inv[k]||0)-v);}
function getAtk(){const w=G.equipped.weapon;return w&&RECIPES[w]?RECIPES[w].atk||2:2;}
function getDef(){const a=G.equipped.armor;return a&&RECIPES[a]?RECIPES[a].def||0:0;}
function applyDmg(dmg){const def=getDef();const actual=Math.max(1,dmg-Math.floor(def/2));G.s.hp=cl(G.s.hp-actual);return actual;}

// ═══════════════════════════════════
// TICK
// ═══════════════════════════════════
function tick(mins=30){
  if(!G||G.dead||G.won)return;
  G.minute+=mins;
  while(G.minute>=60){G.minute-=60;G.hour++;}
  while(G.hour>=24){
    G.hour-=24;G.day++;regenResources();
    log(`── 第 ${G.day} 天 ──`,'lx');
    if(G.built.some(b=>b.type==='陷阱')){
      const chance=G.shelterStage>=4?0.6:0.4;
      if(Math.random()<chance){
        const prey=['野豬肉','獸皮','骨頭'][Math.floor(Math.random()*3)];
        const trap=G.built.find(b=>b.type==='陷阱');
        G.trapLoot.push({prey,x:trap.x,y:trap.y});
        log(`陷阱有收穫！回到 (${trap.x},${trap.y}) 執行 co 取得。`,'lo');
      }
    }
    if(G.day>=30&&G.shelterStage>=6)doWin();
    else if(G.day>=30&&G.shelterStage>=5)log('信號台已完成！打倒叢林巨獸並完成永久營地才能獲救。','lo');
    else if(G.day>=30)log('救援直升機飛過但未發現你...','ld');
  }
  G.weatherTimer-=mins;if(G.weatherTimer<=0)doWeather();
  const night=G.hour<6||G.hour>=20;
  G.s.hunger=cl(G.s.hunger-2);G.s.thirst=cl(G.s.thirst-3);
  G.s.sleep=cl(G.s.sleep-(night?0:2));
  if(G.infected)G.s.hp=cl(G.s.hp-2);
  if(G.s.hunger<=0)G.s.hp=cl(G.s.hp-4);
  if(G.s.thirst<=0)G.s.hp=cl(G.s.hp-6);
  if(G.s.sleep<=0)G.s.hp=cl(G.s.hp-1);
  if(night&&G.day>=3&&G.shelterStage<3&&G.hour===2&&Math.random()<0.2){
    const actual=applyDmg(12);
    log(`夜間野獸靠近！受傷 -${actual} HP${actual<12?' (防具減傷)':''}。`,'ld');
    if(Math.random()<0.24){G.infected=true;log('爪痕感染！','ld');}
  }
  G.tickN++;if(G.tickN%5===0)warnStats();if(G.s.hp<=0)doDeath();
}

function warnStats(){
  if(G.s.hunger<30)log('⚠ 飢餓警告','lw');
  if(G.s.thirst<25)log('⚠ 缺水警告','lw');
  if(G.s.sleep<20)log('⚠ 極度睏倦！探索效率下降。','lw');
  if(G.s.sleep<=0)log('⚠ 你已精疲力竭，生命值持續下降！','ld');
  if(G.infected)log('⚠ 傷口感染中，需要治療','ld');
}

function doWeather(){
  const pool=['clear','clear','clear','rain','rain','storm','fog'];
  G.weather=pool[Math.floor(Math.random()*pool.length)];G.weatherTimer=60+Math.random()*120;
  const wm={clear:'天氣放晴了。',rain:'開始下雨，co 可收集雨水。',storm:'熱帶暴雨！co 可收集雨水。',fog:'清晨濃霧，能見度低。'};
  log(wm[G.weather],G.weather==='clear'?'ls':G.weather==='fog'?'lm':'lw');
}

function descLoc(){
  const t=G.map[G.py][G.px];const td=TR[t];const cell=getCell();
  log(`[${td?.lb}] (${G.px},${G.py})  ${td?.desc||''}`,t==='boss'?'lb':'lm');
  if(t==='boss'){
    if(G.bossDefeated){log('叢林巨獸已被你討伐，獸骨核心已在背包中。','ls');}
    else{
      const rage=bossRage();
      const danger=G.bossHp>120?'極度危險':G.bossHp>80?'重傷，仍危險':rage?'⚠ 狂暴！極危險':'瀕死，可以一搏！';
      log(`💀 叢林巨獸 HP:${G.bossHp}/${BOSS_MAX_HP}  ATK:${rage?BOSS_ATK_RAGE:BOSS_ATK}${rage?'【狂暴】':''}  DEF:${BOSS_DEF}  [${danger}]`,'lb');
      if(rage)log('⚠ 巨獸進入狂暴！ATK 大幅提升，請謹慎！','ld');
      log(`你的 ATK:${getAtk()}  DEF:${getDef()}  HP:${Math.round(G.s.hp)}  → at 主動攻擊一次`,'lw');
    }
  }else if(t==='river'){log('可採集: 魚、石頭（無限）。co 可取水。','lm');}
  else if(cell.cur<=0){log(`資源耗盡。${regenLabel(t,cell)}`,'ld');}
  else{log(`可採集: ${[...new Set(td?.res||[])].join('、')}（剩 ${cell.cur}/${cell.max}）`,'lm');}
  const here=G.built.filter(b=>b.x===G.px&&b.y===G.py);
  if(here.length){
    log(`設施: ${here.map(b=>b.type).join('、')}`,'ls');
    // 如果有醫療站，提示加成
    if(here.some(b=>b.type==='醫療站'))log('💊 醫療站在此！使用急救藥效果提升至 HP+50','ls');
  }
  const pendingHere=G.trapLoot.filter(tl=>tl.x===G.px&&tl.y===G.py);
  if(pendingHere.length)log(`陷阱有 ${pendingHere.length} 份獵物待取！(co 取得)`,'lo');
}

function doMove(dir){
  const d=DIR_DELTA[dir];if(!d){log('方向錯誤，請輸入 n/s/e/w','lw');return;}
  const nx=G.px+d[0],ny=G.py+d[1];
  if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H){log('前方無路可走。','lw');return;}
  G.px=nx;G.py=ny;reveal(nx,ny,1);tick(30);
  log(`往${DIR_NAME[dir]}方移動了。(${G.px},${G.py})`,'lm');
  descLoc();renderAll();
}

function doExplore(){
  const t=G.map[G.py][G.px];
  if(t==='boss'){log('這是BOSS領地，無法在此採集。','lw');return;}
  const cell=getCell();const td=TR[t];
  if(t!=='river'&&cell.cur<=0){log(`此處資源耗盡。${regenLabel(t,cell)}`,'ld');return;}
  if(G.s.sleep<20&&Math.random()<0.5){tick(30);log('你昏昏欲睡，探索毫無所獲。需要睡覺！','lw');renderAll();return;}
  tick(30);
  const res=td?.res||[];
  if(res.length){
    const item=res[Math.floor(Math.random()*res.length)];const qty=1+Math.floor(Math.random()*2);
    addItem(item,qty);log(`在${td.lb}採集，獲得 <span style="color:#ffcc00">${item} ×${qty}</span>`,'li');
    if(Math.random()<0.3){const i2=res[Math.floor(Math.random()*res.length)];addItem(i2,1);log(`也發現了 ${i2} ×1`,'lm');}
    if(t!=='river'){
      cell.cur=Math.max(0,cell.cur-1);
      if(cell.cur===0){if(TR[t].regenDays>0)cell.regenDay=G.day+TR[t].regenDays;log(`${td.lb}資源已耗盡！${regenLabel(t,cell)}`,'lw');}
      else if(cell.cur<=Math.floor(cell.max*0.3))log(`${td.lb}資源稀少（剩${cell.cur}）。`,'lw');
    }
  }
  if(Math.random()<0.4)triggerEvent(t);
  renderAll();
}

function doAttack(){
  const t=G.map[G.py][G.px];
  if(t!=='boss'){log('附近沒有可攻擊的目標。移動到 BOSS 領地（B）才能攻擊。','lw');return;}
  if(G.bossDefeated){log('叢林巨獸已被討伐。','lm');return;}
  const rage=bossRage();
  const currentBossAtk=rage?BOSS_ATK_RAGE:BOSS_ATK;
  const playerDmg=Math.max(1,getAtk()+Math.floor(Math.random()*6)-Math.floor(BOSS_DEF/2));
  const bossDmg=Math.max(1,currentBossAtk+Math.floor(Math.random()*6)-Math.floor(getDef()/2));
  G.bossHp=Math.max(0,G.bossHp-playerDmg);
  G.s.hp=cl(G.s.hp-bossDmg);
  const infected=!G.infected&&Math.random()<BOSS_INFECT;
  if(infected)G.infected=true;
  logSep();
  log(`⚔ 你攻擊叢林巨獸！造成 ${playerDmg} 傷害。`,'ls');
  log(`💀 ${rage?'【狂暴】':''}巨獸反擊！你受到 ${bossDmg} 傷害${getDef()>0?' (防具減傷)':''}。`,'ld');
  if(infected)log('💉 巨獸爪牙帶有毒素，傷口感染！','ld');
  log(`巨獸剩餘 HP: ${G.bossHp}/${BOSS_MAX_HP}  你的 HP: ${Math.round(G.s.hp)}`,'lw');
  if(!rage&&G.bossHp<=BOSS_RAGE_HP&&G.bossHp>0){logSep();log('💢 叢林巨獸進入狂暴狀態！ATK 大幅提升！','ld');}
  if(G.bossHp<=0){
    G.bossDefeated=true;logSep();
    log('💀 叢林巨獸轟然倒地！','lb');
    log('整片叢林陷入寂靜，你取出發光的獸骨核心...','lm');
    addItem('獸骨核心',1);
    log('取得: <span style="color:#ff44ff">獸骨核心 ×1</span>  → b 6 永久營地','ls');logSep();
  }else{
    const warn=G.s.hp<20?'⚠ HP極低，立刻撤退！':G.s.hp<40?'⚠ HP危險，建議先治療。':'at 繼續 / 移動撤退';
    log(warn,G.s.hp<40?'ld':'lm');
  }
  tick(30);
  if(G.s.hp<=0){doDeath();return;}
  renderAll();
}

function triggerEvent(terrain){
  const pool=EVENTS[terrain]||EVENTS.clear;const ev=pool[Math.floor(Math.random()*pool.length)];
  log('〔事件〕','lm');log(ev.msg,ev.type==='combat'?'ld':ev.type==='dmg'?'lw':'li');
  switch(ev.type){
    case 'item':addItem(ev.item,ev.qty);log(`取得: ${ev.item} ×${ev.qty}`,'ls');break;
    case 'loot':Object.entries(ev.items).forEach(([k,v])=>addItem(k,v));log(`取得: ${Object.entries(ev.items).map(([k,v])=>k+'×'+v).join(', ')}`,'ls');break;
    case 'dmg':{const actual=applyDmg(ev.dmg);const def=getDef();log(`受傷 -${actual} HP${def>0&&actual<ev.dmg?' (防具減傷)':''}。`,'lw');if((ev.infectChance||0)>0&&Math.random()<ev.infectChance){G.infected=true;log('傷口感染！','ld');}break;}
    case 'combat':doCombat(ev);break;
    case 'npc':log(NPC_LINES[Math.floor(Math.random()*NPC_LINES.length)],'lx');break;
    case 'atm':break;
  }
}

function doCombat(ev){
  const atk=getAtk(),def=getDef();let eHp=ev.hp,rounds=0;
  while(eHp>0&&G.s.hp>0&&rounds<15){eHp-=atk+Math.floor(Math.random()*6);G.s.hp=cl(G.s.hp-Math.max(1,ev.atk-def+Math.floor(Math.random()*5)-2));rounds++;}
  if(G.s.hp>0&&eHp<=0){log(`擊敗了${ev.enemy}！`,'ls');if(ev.drop){Object.entries(ev.drop).forEach(([k,v])=>addItem(k,v));log(`戰利品: ${Object.entries(ev.drop).map(([k,v])=>k+'×'+v).join(', ')}`,'ls');}}
  else{log(`${ev.enemy}擊傷你，你勉強逃脫。HP: ${Math.round(G.s.hp)}`,'ld');if(Math.random()<0.24){G.infected=true;log('傷口感染！','ld');}}
}

function doCraft(item){
  if(!item){log('用法: c [物品名]  例: c 木桶','lw');return;}
  const rec=RECIPES[item];if(!rec){log(`不知道如何製作「${item}」，查看配方面板。`,'lw');return;}
  if(NEED_FIRE.has(item)&&!hasFire()){log(`製作「${item}」需要先在此處建造火堆。(c 火堆)`,'lw');return;}
  const miss=Object.entries(rec.needs).filter(([k,v])=>(G.inv[k]||0)<v).map(([k,v])=>`${k}(缺${v-(G.inv[k]||0)})`);
  if(miss.length){log(`材料不足: ${miss.join(', ')}`,'lw');return;}
  Object.entries(rec.needs).forEach(([k,v])=>remItem(k,v));Object.entries(rec.gives).forEach(([k,v])=>addItem(k,v));
  tick(60);log(`製作完成: <span style="color:#ffcc00">${item}</span> — ${rec.purpose||''}`,'ls');
  if(rec.type==='weapon'){log(`提示: <span style="color:#39ff6e">eq ${item}</span> 裝備此武器。`,'lm');}
  else if(rec.type==='armor'){log(`提示: <span style="color:#39ff6e">eq ${item}</span> 裝備此防具。`,'lm');}
  else if(rec.type==='build'){G.built.push({x:G.px,y:G.py,type:item});log(`${item} 已建造於此處。`,'ls');}
  else if(rec.type==='food_item'){log(`${item} 已放入背包，輸入 eat ${item} 食用。`,'lm');}
  renderAll();
}

function doEquip(item){
  if(!item){
    const weapons=Object.keys(G.inv).filter(k=>WEAPON_ITEMS.has(k)&&G.inv[k]>0);
    const armors =Object.keys(G.inv).filter(k=>ARMOR_ITEMS.has(k) &&G.inv[k]>0);
    if(!weapons.length&&!armors.length){log('背包裡沒有可裝備的武器或防具。','lw');return;}
    if(weapons.length)log(`可裝備的武器: ${weapons.join('、')}  → eq [名稱]`,'lm');
    if(armors.length) log(`可裝備的防具: ${armors.join('、')}  → eq [名稱]`,'lm');
    return;
  }
  if(!(G.inv[item]>0)){log(`背包裡沒有「${item}」。`,'lw');return;}
  if(WEAPON_ITEMS.has(item)){
    const old=G.equipped.weapon;G.equipped.weapon=item;
    log(`武器已裝備: ${item}（ATK+${RECIPES[item]?.atk||0}）${old?` ← 替換了 ${old}`:''}`,'ls');
  }else if(ARMOR_ITEMS.has(item)){
    const old=G.equipped.armor;G.equipped.armor=item;
    log(`防具已裝備: ${item}（DEF+${RECIPES[item]?.def||0}）${old?` ← 替換了 ${old}`:''}`,'ls');
  }else{log(`「${item}」不是可裝備的武器或防具。`,'lw');return;}
  renderAll();
}

function doBuild(stage){
  if(isNaN(stage)){log('用法: b [1-6]  例: b 1','lw');return;}
  if(stage!==G.shelterStage+1){log(`請先完成第${G.shelterStage+1}階段避難所。`,'lw');return;}
  if(stage>6){log('避難所已完整建造！','ls');return;}
  const st=STAGES[stage];
  const miss=Object.entries(st.needs).filter(([k,v])=>(G.inv[k]||0)<v).map(([k,v])=>`${k}(缺${v-(G.inv[k]||0)})`);
  if(miss.length){log(`材料不足: ${miss.join(', ')}`,'lw');return;}
  Object.entries(st.needs).forEach(([k,v])=>remItem(k,v));G.shelterStage=stage;tick(120);
  logSep();log(`避難所升級 → ${st.name}`,'ls');log(`解鎖: ${st.bonus}`,'lo');logSep();
  if(stage===6&&G.day>=30)doWin();
  else if(stage===6)log('永久營地完成！撐到第30天即可獲救。','lo');
  else if(stage===5)log('信號台完成！現在去擊敗叢林巨獸 (at)，取得獸骨核心。','lb');
  renderAll();
}

function doEat(item){
  if(!item){const a=Object.keys(EDIBLE).find(k=>(G.inv[k]||0)>0);if(!a){log('背包裡沒有食物。','lw');return;}item=a;}
  if(!(G.inv[item]>0)){log(`你沒有「${item}」。`,'lw');return;}
  const val=EDIBLE[item];
  if(!val){if(item==='蘑菇')log('生蘑菇有毒！先用火堆 c 蘑菇湯 再食用。','lw');else log(`「${item}」不是食物，試試 u ${item}。`,'lw');return;}
  G.s.hunger=cl(G.s.hunger+val.hunger);if(val.thirst)G.s.thirst=cl(G.s.thirst+val.thirst);
  log(`吃了 ${item}，飢餓+${val.hunger}${val.thirst?`，口渴+${val.thirst}`:''}。`,'ls');
  remItem(item,1);tick(10);renderAll();
}

function doDrink(){
  if((G.inv['水']||0)>0){G.s.thirst=cl(G.s.thirst+50);remItem('水',1);log('你喝了背包裡的水，口渴緩解。','ls');}
  else{log('背包裡沒有水了。','lw');log('提示: co 在河邊或下雨時收集水（需要木桶）。','lm');}
  tick(10);renderAll();
}

function doCollect(){
  const t=G.map[G.py][G.px];const rain=G.weather==='rain'||G.weather==='storm';
  let acted=false;
  const pending=G.trapLoot.filter(tl=>tl.x===G.px&&tl.y===G.py);
  if(pending.length>0){pending.forEach(tl=>{addItem(tl.prey,1);log(`從陷阱取得: ${tl.prey} ×1`,'ls');});G.trapLoot=G.trapLoot.filter(tl=>!(tl.x===G.px&&tl.y===G.py));acted=true;}
  const needWater=t==='river'||rain;
  if(needWater){
    if(!hasBarrel()&&!hasTube()){log('需要先製作木桶才能收集水。(c 木桶，需要原木×3)','lw');if(!acted)return;}
    else{
      if(t==='river'){
        if(hasTube()){addItem('水',3);log('竹水管淨化取水×3，無感染風險（存入背包）。','ls');}
        else{addItem('水',2);log('用木桶在河邊取水×2（存入背包），未淨化有感染風險。','lw');if(Math.random()<0.2){G.infected=true;log('水源污染！腸胃感染。建議製作竹水管。','ld');}}
        acted=true;
      }else if(rain){addItem('水',1);log('用木桶收集了雨水×1（存入背包）。','ls');acted=true;}
    }
  }
  if(!acted){log('這裡沒有可收集的東西。','lw');log('前往河流取水，或等待下雨；陷阱有收穫時回到陷阱位置取得。','lm');return;}
  tick(10);renderAll();
}

function doSleep(){
  const fire=hasFire();const shelter=hasShelter();
  log('你躺下休息...','lm');tick(480);
  let sleepGain,msg;
  if(shelter&&fire){sleepGain=80;msg='舒適睡眠，精神飽滿。';}
  else if(shelter){sleepGain=65;msg='在遮蔽下入睡，睡得還算好。';}
  else if(G.hour>=20||G.hour<6){sleepGain=45;msg='野外露宿，睡眠品質較差。';}
  else{sleepGain=20;msg='白天野外淺眠，幾乎沒有恢復。';}
  G.s.sleep=cl(G.s.sleep+sleepGain);
  log(msg,shelter?'ls':'lw');
  if(!shelter)log('提示: b 1 建造臨時遮蔽可大幅提升睡眠品質。','lm');
  renderAll();
}

function doUse(item){
  if(!item){log('用法: u [物品]  例: u 蘆薈','lw');return;}
  if(!(G.inv[item]>0)){log(`你沒有「${item}」。`,'lw');return;}
  const fn=USABLE[item];if(!fn){log(`不知道如何使用「${item}」，也許可以 c 製作？`,'lw');return;}
  const r=fn(G);if(r!==false)remItem(item,1);tick(10);renderAll();
}

function doMark(desc){
  if(!desc){log('用法: mk [說明]  例: mk 這裡有BOSS','lw');return;}
  const td=TR[G.map[G.py][G.px]];G.marks.push({x:G.px,y:G.py,day:G.day,terrain:td?.lb||'未知',desc});
  log(`📍 已標記 (${G.px},${G.py}) [${td?.lb}]: ${desc}`,'ls');
}
function doMarks(){
  if(!G.marks.length){log('尚未設置任何標記。使用 mk [說明] 新增。','lm');return;}
  logSep();log('─ 所有標記 ─','lx');
  G.marks.forEach((m,i)=>log(`${i+1}. (${m.x},${m.y}) [${m.terrain}] 第${m.day}天 — ${m.desc}`,'li'));
  logSep();
}

function doDeath(){G.dead=true;logSep();log('你在叢林中倒下了。','ld');log(`存活了 ${G.day} 天，避難所第${G.shelterStage}階段。`,'lm');log('輸入 restart 重新開始。','lx');logSep();}
function doWin(){
  if(G.won)return;G.won=true;
  showModal('獲救了！',`第 ${G.day} 天，救援直升機的聲音從天際傳來。\n\n你的求救信號台閃爍著光芒，\n引導飛機降落在你親手建造的永久營地上。\n\n你回頭看了一眼叢林巨獸倒下的位置，\n踏上了回家的路。\n\n恭喜完成 JUNGLE！`);
}
function showModal(t,b){document.getElementById('mtitle').textContent=t;document.getElementById('mbody').innerHTML=b.replace(/\n/g,'<br>');document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');}

// ═══════════════════════════════════
// CMD PARSER
// 移除：shelter/sh, wait/wt, inv/i, rec/r, wr
// 新增：eq（裝備），!! 重複上一個指令
// ═══════════════════════════════════
const ALIASES={
  n:'go n',s:'go s',e:'go e',w:'go w',
  ex:'explore',l:'look',
  d:'drink',co:'collect',sl:'sleep',
  at:'attack',st:'status',
  mk:'mark',mks:'marks',
  eq:'equip',
  '?':'help',h:'help',
};

function repeatLastCmd(){
  if(!lastCmd){log('尚未有指令可重複。','lm');return;}
  processCmd(lastCmd);
}

function submitCmd(){
  const el=document.getElementById('inp');
  processCmd(el.value);
  el.value='';
  el.focus();
}

function processCmd(raw){
  if(!raw.trim()){
    // 空白 Enter 也可重複上一個指令（手機快捷）
    if(lastCmd)repeatLastCmd();
    return;
  }

  // !! 重複上一個指令
  if(raw.trim()==='!!'){repeatLastCmd();return;}

  let parts=raw.trim().split(/\s+/),cmd=parts[0].toLowerCase(),arg=parts.slice(1).join(' ');
  if(ALIASES[cmd]){const ex=ALIASES[cmd].split(' ');cmd=ex[0];if(ex[1]&&!arg)arg=ex[1];}
  if(cmd==='c'&&arg)cmd='craft';
  if(cmd==='b'&&arg)cmd='build';
  if(cmd==='u'&&arg)cmd='use';

  // 記錄上一個有效指令（排除 help/status/marks 等純查詢）
  const noRecord=new Set(['help','status','marks','?','h','st','mks']);
  if(!noRecord.has(cmd)){
    lastCmd=raw.trim();
    updateLastCmdBar();
  }

  log(`<span style="color:var(--td)">></span> ${raw}`,'lm');

  if(G?.dead||G?.won){if(cmd==='restart'||cmd==='new')restartGame();else log('遊戲已結束。輸入 restart 重新開始。','lm');return;}

  switch(cmd){
    case 'go':doMove(arg.toLowerCase());break;
    case 'look':tick(10);descLoc();renderAll();break;
    case 'explore':doExplore();break;
    case 'craft':doCraft(arg);break;
    case 'equip':doEquip(arg||null);break;
    case 'build':doBuild(parseInt(arg));break;
    case 'eat':doEat(arg||null);break;
    case 'drink':doDrink();break;
    case 'collect':doCollect();break;
    case 'sleep':doSleep();break;
    case 'use':doUse(arg);break;
    case 'attack':doAttack();break;
    case 'mark':doMark(arg);break;
    case 'marks':doMarks();break;
    case 'status':
      logSep();
      log(`HP:${Math.round(G.s.hp)} 飢餓:${Math.round(G.s.hunger)} 口渴:${Math.round(G.s.thirst)} 睡眠:${Math.round(G.s.sleep)}`,'li');
      log(`感染:${G.infected?'是':'否'} ATK:${getAtk()} DEF:${getDef()}`,'li');
      log(`位置:(${G.px},${G.py}) 第${G.day}天 避難所:${STAGES[G.shelterStage]?.name}`,'li');
      if(!G.bossDefeated)log(`叢林巨獸 HP:${G.bossHp}/${BOSS_MAX_HP}${bossRage()?' 【狂暴】':''}`,'lb');
      else log('叢林巨獸: 已討伐 ✓','ls');
      if(G.trapLoot.length)log(`陷阱待取: ${G.trapLoot.map(t=>`(${t.x},${t.y}) ${t.prey}`).join(' | ')}`,'lo');
      logSep();break;
    case 'help':
      logSep();log('─ 指令（短 / 完整）─','lx');
      [
        ['n s e w','go n/s/e/w',   '移動方向（北=y+，南=y−）'],
        ['ex',     'explore',      '探索採集（睡眠<20效率減半）'],
        ['l',      'look',         '查看地形、資源、BOSS狀態、醫療站'],
        ['c [物品]','craft [物品]', '製作物品（武器/防具需 eq 裝備）'],
        ['eq [物品]','equip [物品]','裝備武器或防具（省略列出可裝備物品）'],
        ['b [1-6]', 'build [1-6]', '升級避難所'],
        ['eat',    'eat [食物]',    '吃東西（部分食物補水）'],
        ['d',      'drink',        '喝背包裡的水'],
        ['co',     'collect',      '取水（需木桶）；取陷阱獵物'],
        ['sl',     'sleep',        '睡覺'],
        ['u [物品]','use [物品]',   '使用道具'],
        ['at',     'attack',       '在BOSS領地主動攻擊一次'],
        ['st',     'status',       '詳細狀態'],
        ['mk [說明]','mark [說明]', '標記當前位置'],
        ['mks',    'marks',        '顯示所有標記'],
        ['!!',     '!!',           '重複上一個指令（手機快捷）'],
        ['',       'restart',      '重新開始'],
        ['?',      'help',         '顯示此說明'],
      ].forEach(([s,f,d])=>{
        const sc=s?`<span style="color:#39ff6e">${s}</span> / `:'       ';
        log(`${sc}<span style="color:#5a9a6a">${f}</span> — ${d}`,'li');
      });
      logSep();
      log('─ 醫療站說明 ─','lo');
      log('在醫療站所在格使用 u 急救藥，HP回復從+30提升至+50','lm');
      log('建議建造在你的主要基地格，並在此儲存急救藥','lm');
      logSep();
      log('─ 素材地形對照 ─','lo');
      [['原木、藤蔓、棕櫚葉、藥草、蘑菇','雨林 T'],['竹子、樹皮','竹林 %'],
       ['石頭、燧石、骨頭','山坡 ^'],['黏土、蘆薈','沼澤 *'],
       ['魚（無限）','河流 ~'],['野果、香蕉','空地 .'],
       ['金屬碎片、電線、防水布（每5天再生）','殘骸 #'],
       ['獸骨核心（唯一來源）','BOSS領地 B'],
      ].forEach(([items,terrain])=>log(`${items} → ${terrain}`,'lm'));
      logSep();
      log('─ BOSS 說明 ─','lb');
      log(`HP:${BOSS_MAX_HP} ATK:${BOSS_ATK} DEF:${BOSS_DEF}，HP<${BOSS_RAGE_HP}時狂暴 ATK→${BOSS_ATK_RAGE}`,'lm');
      log('每次反擊 30% 感染機率，建議帶足繃帶和急救藥','lm');
      logSep();
      log('─ 通關路線 ─','lo');
      log('b1→b2→b3→b4→b5 → 擊敗BOSS (at) → b6 → 第30天獲救','lm');
      log('b6 需要: 原木×15、獸骨核心×1、繩索×6、金屬碎片×4','lm');
      logSep();break;
    case 'restart':case 'new':restartGame();break;
    default:log(`未知指令「${cmd}」，輸入 ? 查看說明。`,'lw');
  }
}

function restartGame(){document.getElementById('log').innerHTML='';closeModal();lastCmd='';updateLastCmdBar();newGame();}

document.addEventListener('DOMContentLoaded',()=>{
  const inp=document.getElementById('inp');
  // 移除上下鍵功能，只保留 Enter
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){submitCmd();}
  });
  document.addEventListener('click',e=>{
    if(!e.target.closest('#modal')&&!e.target.closest('#tabs')&&!e.target.closest('#inp-btn')&&!e.target.closest('#last-cmd-btn'))inp.focus();
  });
  newGame();
});
