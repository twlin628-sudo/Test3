<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>JUNGLE — 叢林求生</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --g:#39ff6e;--gd:#22cc50;
  --a:#ffcc00;--r:#ff3355;--b:#33ccff;--p:#bb88ff;--o:#ff8833;
  --bg:#050f07;--bg2:#091508;--bg3:#0d1e0e;
  --bd:#1c3820;--bd2:#2a5030;
  --t:#b8ffcc;--td:#5a9a6a;--tx:#253a28;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--t);
  font-family:'Share Tech Mono',monospace;font-size:15px;
  display:flex;flex-direction:column;
  max-width:393px;margin:0 auto;height:100dvh;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
body::before{
  content:'';position:fixed;inset:0;max-width:393px;margin:0 auto;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,80,0.018) 3px,rgba(0,255,80,0.018) 4px);
  pointer-events:none;z-index:900;
}
#hdr{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bd);padding:8px 12px 7px;}
#hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
#gtitle{font-family:'VT323',monospace;font-size:26px;color:var(--g);letter-spacing:4px;line-height:1;}
#hdr-right{text-align:right;}
#datetime{font-size:12px;color:var(--td);line-height:1.5;}
#weather-line{font-size:12px;color:var(--b);line-height:1.5;}
#shelter-wrap{margin-bottom:6px;}
#shelter-label{display:flex;justify-content:space-between;font-size:11px;color:var(--td);margin-bottom:3px;}
#shelter-bar{height:5px;background:var(--bd);border-radius:3px;overflow:hidden;}
#shelter-fill{height:100%;background:linear-gradient(90deg,var(--gd),var(--a));border-radius:3px;transition:width 0.5s;}
/* 四個狀態列：HP 飢餓 口渴 睡眠 */
#stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 12px;}
.sm{display:flex;flex-direction:column;gap:2px;}
.sm-top{display:flex;justify-content:space-between;font-size:12px;}
.sml{color:var(--td);}.smv{color:var(--t);font-weight:500;}
.sbar{height:5px;background:var(--bd);border-radius:2px;overflow:hidden;}
.sf{height:100%;border-radius:2px;transition:width 0.3s;}
.hp{background:var(--r);}.hun{background:var(--a);}.thi{background:var(--b);}.slp{background:var(--p);}
/* LOG */
#log{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 13px 6px;-webkit-overflow-scrolling:touch;}
#log::-webkit-scrollbar{width:2px;}
#log::-webkit-scrollbar-thumb{background:var(--bd2);}
.ll{line-height:1.85;font-size:15px;word-break:break-all;}
.li{color:var(--t);}.lw{color:var(--a);}.ld{color:var(--r);}
.ls{color:var(--g);}.lm{color:var(--td);}.lx{color:var(--b);}
.lp{color:var(--bd2);user-select:none;}.lo{color:var(--o);}
/* LOC BAR */
#loc-bar{
  flex-shrink:0;background:var(--bg3);border-bottom:1px solid var(--bd);
  padding:5px 12px;display:flex;align-items:center;justify-content:space-between;font-size:12px;
}
#loc-left{display:flex;align-items:center;gap:8px;}
#loc-name{color:var(--td);}#loc-coord{color:var(--tx);font-size:11px;}
#loc-res-wrap{display:flex;align-items:center;gap:6px;}
#loc-res-bar-outer{width:60px;height:5px;background:var(--bd);border-radius:3px;overflow:hidden;}
#loc-res-bar-inner{height:100%;border-radius:3px;transition:width 0.4s;}
#loc-res-label{font-size:11px;color:var(--td);min-width:52px;text-align:right;}
/* TABS */
#tabs{flex-shrink:0;display:flex;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);background:var(--bg2);}
.tab{flex:1;padding:7px 0;text-align:center;font-size:12px;color:var(--td);cursor:pointer;border-right:1px solid var(--bd);transition:all 0.15s;}
.tab:last-child{border-right:none;}
.tab.active{color:var(--g);background:var(--bg3);}
.panel{display:none;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--bd);}
.panel.active{display:block;}
#inv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;max-height:110px;overflow-y:auto;}
.inv-cell{background:var(--bg3);border:1px solid var(--bd);padding:5px 6px;font-size:11px;border-radius:3px;display:flex;justify-content:space-between;align-items:center;}
.ic-n{color:var(--t);}.ic-q{color:var(--a);font-size:12px;}
#eq-wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;}
.eq-slot{background:var(--bg3);border:1px solid var(--bd);padding:5px 8px;border-radius:3px;}
.eq-l{font-size:10px;color:var(--td);}.eq-v{font-size:13px;color:var(--a);}
#rec-list{max-height:115px;overflow-y:auto;}
.ri{display:grid;grid-template-columns:14px 68px 1fr;gap:4px;align-items:baseline;padding:3px 0;border-bottom:1px solid var(--bd);font-size:12px;line-height:1.7;}
.ri:last-child{border-bottom:none;}
.rc{color:var(--g);}.rn2{color:var(--tx);}
.rnm{color:var(--t);}
.ri-right{display:flex;flex-direction:column;}
.rnd{color:var(--td);font-size:10px;}.rpu{color:var(--o);font-size:10px;}
#shelter-detail{font-size:13px;line-height:1.9;}
.sh-stage{padding:4px 0;border-bottom:1px solid var(--bd);display:flex;gap:8px;align-items:flex-start;}
.sh-done{color:var(--g);}.sh-next{color:var(--a);}.sh-lock{color:var(--tx);}
.sh-name{min-width:70px;}.sh-need{font-size:11px;color:var(--td);flex:1;}
/* INPUT */
#inp-area{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-top:1px solid var(--bd);}
#inp-prompt{color:var(--g);font-size:18px;line-height:1;}
#inp{flex:1;background:transparent;border:none;outline:none;color:var(--g);font-family:'Share Tech Mono',monospace;font-size:15px;caret-color:var(--g);min-width:0;padding:4px 0;}
#inp::placeholder{color:var(--tx);}
#inp-btn{background:var(--bg3);border:1px solid var(--bd2);color:var(--td);font-family:'Share Tech Mono',monospace;font-size:13px;padding:5px 12px;cursor:pointer;border-radius:3px;flex-shrink:0;}
#inp-btn:active{background:var(--bd2);}
/* MODAL */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:999;align-items:center;justify-content:center;max-width:393px;margin:0 auto;}
#modal.show{display:flex;}
#mbox{background:var(--bg2);border:1px solid var(--gd);padding:24px 20px;width:90%;font-size:14px;line-height:2;}
#mtitle{font-family:'VT323',monospace;font-size:28px;color:var(--g);margin-bottom:12px;letter-spacing:2px;}
#mbody{color:var(--t);margin-bottom:16px;}
#mclose{background:transparent;border:1px solid var(--gd);color:var(--g);font-family:'Share Tech Mono',monospace;font-size:14px;padding:6px 0;cursor:pointer;width:100%;}
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-top">
    <div id="gtitle">JUNGLE</div>
    <div id="hdr-right">
      <div id="datetime">第1天 06:00</div>
      <div id="weather-line">☀ 晴天</div>
    </div>
  </div>
  <div id="shelter-wrap">
    <div id="shelter-label">
      <span id="shelter-stage-name">避難所: 未建造</span>
      <span id="shelter-pct">0%</span>
    </div>
    <div id="shelter-bar"><div id="shelter-fill" style="width:0%"></div></div>
  </div>
  <div id="stats-row">
    <div class="sm"><div class="sm-top"><span class="sml">生命</span><span class="smv" id="v-hp">100</span></div><div class="sbar"><div class="sf hp" id="b-hp" style="width:100%"></div></div></div>
    <div class="sm"><div class="sm-top"><span class="sml">飢餓</span><span class="smv" id="v-hun">100</span></div><div class="sbar"><div class="sf hun" id="b-hun" style="width:100%"></div></div></div>
    <div class="sm"><div class="sm-top"><span class="sml">口渴</span><span class="smv" id="v-thi">100</span></div><div class="sbar"><div class="sf thi" id="b-thi" style="width:100%"></div></div></div>
    <div class="sm"><div class="sm-top"><span class="sml">睡眠</span><span class="smv" id="v-slp">100</span></div><div class="sbar"><div class="sf slp" id="b-slp" style="width:100%"></div></div></div>
  </div>
</div>

<div id="loc-bar">
  <div id="loc-left">
    <span id="loc-name">✈ 墜機殘骸</span>
    <span id="loc-coord">(5,5)</span>
  </div>
  <div id="loc-res-wrap">
    <div id="loc-res-bar-outer"><div id="loc-res-bar-inner" style="width:100%"></div></div>
    <span id="loc-res-label">資源充足</span>
  </div>
</div>

<div id="log"></div>

<div id="tabs">
  <div class="tab active" onclick="switchTab('inv')">背包</div>
  <div class="tab" onclick="switchTab('eq')">裝備</div>
  <div class="tab" onclick="switchTab('rec')">配方</div>
  <div class="tab" onclick="switchTab('shlt')">避難所</div>
</div>
<div id="panel-inv" class="panel active"><div id="inv-grid"></div></div>
<div id="panel-eq"  class="panel"><div id="eq-wrap"></div></div>
<div id="panel-rec" class="panel"><div id="rec-list"></div></div>
<div id="panel-shlt" class="panel"><div id="shelter-detail"></div></div>

<div id="inp-area">
  <span id="inp-prompt">&gt;</span>
  <input id="inp" type="text" placeholder="輸入指令... (? 查看說明)" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
  <button id="inp-btn" onclick="submitCmd()">送出</button>
</div>

<div id="modal">
  <div id="mbox">
    <div id="mtitle"></div>
    <div id="mbody"></div>
    <button id="mclose" onclick="closeModal()">[ 確認 ]</button>
  </div>
</div>

<script>
// ═══════════════════════════════════
// TERRAIN
// ═══════════════════════════════════
const TR={
  jungle:{ch:'T',lb:'雨林',  icon:'🌿',maxRes:8, regenDays:2, res:['原木','棕櫚葉','藤蔓','野果','藥草','樹皮','原木','藤蔓','蘑菇'],   desc:'巨木參天，藤蔓纏繞，叫聲四起。'},
  bamboo:{ch:'%',lb:'竹林',  icon:'🎋',maxRes:6, regenDays:3, res:['竹子','竹子','竹子','藤蔓','樹皮'],                                   desc:'翠綠竹林沙沙作響，清涼宜人。'},
  hill:  {ch:'^',lb:'山坡',  icon:'⛰',maxRes:5, regenDays:4, res:['石頭','石頭','燧石','骨頭','石頭'],                                   desc:'岩石裸露，視野開闊。'},
  swamp: {ch:'*',lb:'沼澤',  icon:'🌊',maxRes:6, regenDays:2, res:['黏土','黏土','蘆薈','藥草','黏土'],                                   desc:'陰暗泥濘，蟲鳴不絕。'},
  river: {ch:'~',lb:'河流',  icon:'💧',maxRes:999,regenDays:0,res:['魚','魚','石頭'],                                                     desc:'湍急清澈，可取水和捕魚。'},
  clear: {ch:'.',lb:'空地',  icon:'🌱',maxRes:4, regenDays:2, res:['野果','香蕉','蘆薈','野果'],                                          desc:'開闊地帶，適合建造避難所。'},
  wreck: {ch:'#',lb:'墜機殘骸',icon:'✈',maxRes:10,regenDays:0,res:['金屬碎片','電線','防水布','急救包','金屬碎片','電線'],                desc:'扭曲機身散落各處，物資等待發掘。'},
};

const MAP_W=11,MAP_H=11;
const DIR_DELTA={n:[0,1],s:[0,-1],e:[1,0],w:[-1,0],north:[0,1],south:[0,-1],east:[1,0],west:[-1,0]};
const DIR_NAME={n:'北',s:'南',e:'東',w:'西',north:'北',south:'南',east:'東',west:'西'};

// ═══════════════════════════════════
// SHELTER STAGES
// ═══════════════════════════════════
const STAGES=[
  {id:0,name:'未建造',    needs:{},                                      bonus:''},
  {id:1,name:'臨時遮蔽',  needs:{棕櫚葉:6,樹枝:4,繩索:2},               bonus:'睡眠品質提升'},
  {id:2,name:'基礎木屋',  needs:{原木:10,竹子:6,藤蔓:4,繩索:2},         bonus:'夜間防獸效果提升'},
  {id:3,name:'強化結構',  needs:{原木:15,石頭:8,黏土:6,骨釘:4},         bonus:'防止夜間獸襲'},
  {id:4,name:'生活設施',  needs:{原木:10,金屬碎片:4,竹子:6,繩索:3},     bonus:'陷阱捕獵效率提升'},
  {id:5,name:'求救信號台',needs:{金屬碎片:8,電線:3,防水布:2,繩索:4},    bonus:'觸發救援結局！'},
];

// 需要火堆才能製作
const NEED_FIRE=new Set(['烤肉','烤魚','蘑菇湯']);

const RECIPES={
  // ── 材料轉換 ──
  '繩索':    {needs:{藤蔓:3},               gives:{繩索:2},     type:'material', purpose:'建造避難所、武器防具必備'},
  '骨釘':    {needs:{骨頭:2},               gives:{骨釘:3},     type:'material', purpose:'避難所第3階段建造用'},
  '樹枝':    {needs:{原木:1},               gives:{樹枝:3},     type:'material', purpose:'避難所第1階段、火堆原料'},
  // ── 武器 ──
  '燧石刀':  {needs:{燧石:2,樹枝:1},         gives:{燧石刀:1},  type:'weapon',   atk:7,  purpose:'基礎刀具，ATK+7'},
  '竹矛':    {needs:{竹子:2,繩索:1},          gives:{竹矛:1},    type:'weapon',   atk:10, purpose:'輕量遠攻，ATK+10'},
  '石斧':    {needs:{石頭:2,原木:1,繩索:1},   gives:{石斧:1},    type:'weapon',   atk:13, purpose:'砍樹+戰鬥，ATK+13'},
  '骨刀':    {needs:{骨頭:3,繩索:1},          gives:{骨刀:1},    type:'weapon',   atk:9,  purpose:'骨頭打磨，ATK+9'},
  '金屬刀':  {needs:{金屬碎片:2,繩索:1},      gives:{金屬刀:1},  type:'weapon',   atk:18, purpose:'最強武器，ATK+18'},
  // ── 防具 ──
  '棕葉甲':  {needs:{棕櫚葉:6,繩索:3},        gives:{棕葉甲:1},  type:'armor',    def:4,  purpose:'植物防具，DEF+4'},
  '竹甲':    {needs:{竹子:5,繩索:4},           gives:{竹甲:1},    type:'armor',    def:8,  purpose:'竹片鎧甲，DEF+8'},
  '獸皮甲':  {needs:{獸皮:4,繩索:3},           gives:{獸皮甲:1},  type:'armor',    def:12, purpose:'皮革防具，DEF+12'},
  '防水披風':{needs:{防水布:1,繩索:2},          gives:{防水披風:1},type:'armor',    def:3,  purpose:'輕量防具，DEF+3'},
  // ── 建設/工具 ──
  '火堆':    {needs:{原木:3,燧石:1,樹枝:3},    gives:{火堆:1},    type:'build',    purpose:'烹飪食物，提升睡眠品質'},
  '竹水管':  {needs:{竹子:3},                  gives:{竹水管:1},  type:'tool',     purpose:'在河流淨化水，u使用取得水×3'},
  '獸皮水袋':{needs:{獸皮:2,繩索:1},           gives:{獸皮水袋:1},type:'tool',     purpose:'雨天或河邊收集水×2'},
  '陷阱':    {needs:{樹枝:4,繩索:2,電線:1},    gives:{陷阱:1},    type:'build',    purpose:'被動捕獵，每天有機會獲得食物'},
  '醫療站':  {needs:{金屬碎片:2,繩索:3,棕櫚葉:4},gives:{醫療站:1},type:'build',   purpose:'建造後急救藥效果提升'},
  // ── 食物（飢餓+口渴）──
  '烤肉':    {needs:{野豬肉:1},                gives:{烤肉:1},    type:'food',     hunger:65,thirst:0,  purpose:'需要火堆，飢餓+65'},
  '烤魚':    {needs:{魚:1},                   gives:{烤魚:1},     type:'food',     hunger:50,thirst:10, purpose:'需要火堆，飢餓+50，口渴+10'},
  '蘑菇湯':  {needs:{蘑菇:2,水:1},             gives:{蘑菇湯:1},  type:'food',     hunger:45,thirst:25, purpose:'需要火堆，飢餓+45，口渴+25'},
  '乾果':    {needs:{野果:3,棕櫚葉:1},         gives:{乾果:2},    type:'food',     hunger:40,thirst:5,  purpose:'保存食物，飢餓+40，口渴+5'},
  '香蕉乾':  {needs:{香蕉:3,棕櫚葉:1},         gives:{香蕉乾:2},  type:'food',     hunger:45,thirst:5,  purpose:'保存香蕉，飢餓+45，口渴+5'},
  // ── 醫療 ──
  '樹皮茶':  {needs:{樹皮:2,水:1},             gives:{樹皮茶:1},  type:'medical',  purpose:'u飲用，口渴+40'},
  '繃帶':    {needs:{樹皮:2,繩索:1},           gives:{繃帶:2},    type:'medical',  purpose:'u治療，HP+12，清感染'},
  '急救藥':  {needs:{藥草:2,蘆薈:1},           gives:{急救藥:1},  type:'medical',  purpose:'u使用，HP+30，清感染'},
  '魚骨針':  {needs:{魚骨:2},                  gives:{魚骨針:1},  type:'medical',  purpose:'u縫合，清感染，HP+8'},
};

// ── 食物 ──
const EDIBLE={
  野果:   {hunger:20,thirst:8},
  香蕉:   {hunger:30,thirst:10},
  乾果:   {hunger:40,thirst:5},
  香蕉乾: {hunger:45,thirst:5},
  烤肉:   {hunger:65,thirst:0},
  烤魚:   {hunger:50,thirst:10},
  蘑菇湯: {hunger:45,thirst:25},
};

// ── 直接使用 ──
const USABLE={
  棕櫚葉:   G=>{log('棕櫚葉無法直接使用，試試 c 棕葉甲 或 c 乾果。','lw');return false;},
  蘆薈:     G=>{G.s.hp=cl(G.s.hp+15);log('塗抹蘆薈，HP+15','ls');},
  急救包:   G=>{G.s.hp=cl(G.s.hp+50);G.infected=false;log('使用急救包，HP+50，清除感染','ls');},
  繃帶:     G=>{G.s.hp=cl(G.s.hp+12);G.infected=false;log('包紮傷口，HP+12，清感染','ls');},
  急救藥:   G=>{G.s.hp=cl(G.s.hp+30);G.infected=false;log('服用急救藥，HP+30，清感染','ls');},
  樹皮茶:   G=>{G.s.thirst=cl(G.s.thirst+40);log('喝樹皮茶，口渴+40','ls');},
  魚骨針:   G=>{G.infected=false;G.s.hp=cl(G.s.hp+8);log('縫合傷口，感染清除','ls');},
  竹水管:   G=>{
    if(G.map[G.py][G.px]==='river'){addItem('水',3);G.s.thirst=cl(G.s.thirst+30);log('竹水管淨化河水，取得水×3','ls');}
    else{log('需要在河流旁才能使用竹水管。','lw');return false;}
  },
  獸皮水袋: G=>{
    if(G.weather==='rain'||G.weather==='storm'||G.map[G.py][G.px]==='river'){
      addItem('水',2);log('獸皮水袋收集了水×2','ls');
    }else{log('現在沒有雨水或水源可收集。','lw');return false;}
  },
};

// ── 事件 ──

  jungle:[

let G=null;

function hasFire(){return G.built.some(b=>b.x===G.px&&b.y===G.py&&b.type==='火堆');}
function hasShelter(){return G.shelterStage>=1;}

function newGame(){
  const map=genMap();
  let sx=5,sy=5;
  for(let r=0;r<MAP_H;r++)for(let c=0;c<MAP_W;c++){if(map[r][c]==='wreck'){sx=c;sy=r;}}
  const resGrid=[];
  for(let y=0;y<MAP_H;y++){
    resGrid.push([]);
    for(let x=0;x<MAP_W;x++){
      const mx=TR[map[y][x]]?.maxRes||6;
      resGrid[y].push({cur:mx,max:mx,regenDay:0});
    }
  }
  G={
    map,resGrid,
    explored:Array.from({length:MAP_H},()=>Array(MAP_W).fill(false)),
    px:sx,py:sy,
    s:{hp:100,hunger:100,thirst:100,sleep:100},
    infected:false,
    inv:{水:3,繃帶:1},
    equipped:{weapon:null,armor:null},
    built:[],shelterStage:0,
    day:1,hour:6,minute:0,
    weather:'clear',weatherTimer:120,
    tickN:0,dead:false,won:false,
  };
  reveal(sx,sy,2);
  logSep();
  log('  JUNGLE — 叢林求生','lx');
  logSep();
  log('飛機墜入深山叢林，你從殘骸中爬出。','li');
  log('建造避難所，撐到第30天等待救援！','lo');
  logSep();
  log('初始物資: 水×3，繃帶×1','ls');
  log('每塊地形資源有限，耗盡後需等待再生。','lm');
  log('不同素材只能在特定地形採集。','lm');
  logSep();
  log('輸入 <span style="color:#39ff6e">?</span> 查看所有指令。','li');
  log('','li');
  descLoc();renderAll();renderLocBar();
}

function genMap(){
  const m=Array.from({length:MAP_H},()=>Array(MAP_W).fill('jungle'));
  m[5][5]='wreck';
  const types=['bamboo','bamboo','bamboo','hill','hill','swamp','swamp','river','river','clear','clear','clear'];
  for(let i=0;i<26;i++){
    const x=1+Math.floor(Math.random()*(MAP_W-2));
    const y=1+Math.floor(Math.random()*(MAP_H-2));
    if(!(x===5&&y===5))m[y][x]=types[Math.floor(Math.random()*types.length)];
  }
  return m;
}

function reveal(x,y,r){
  for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
    const nx=x+dx,ny=y+dy;
    if(nx>=0&&nx<MAP_W&&ny>=0&&ny<MAP_H)G.explored[ny][nx]=true;
  }
}

function getCell(){return G.resGrid[G.py][G.px];}

function cellLabel(cell,t){
  if(t==='river')return'無限';
  if(cell.cur<=0)return'已耗盡';
  const p=cell.cur/cell.max;
  return p>0.6?'資源充足':p>0.3?'資源稀少':'幾乎耗盡';
}

function cellColor(cell,t){
  if(t==='river')return'#33ccff';
  if(cell.cur<=0)return'#ff3355';
  const p=cell.cur/cell.max;
  return p>0.6?'#22cc50':p>0.3?'#ffcc00':'#ff8833';
}

function regenResources(){
  for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){
    const t=G.map[y][x];const td=TR[t];
    if(!td||td.regenDays===0)continue;
    const cell=G.resGrid[y][x];
    if(cell.cur<cell.max&&G.day>=cell.regenDay)cell.cur=cell.max;
  }
}

function regenLabel(t,cell){
  if(TR[t]?.regenDays===0)return'（永久耗盡）';
  return`約${Math.max(1,cell.regenDay-G.day)}天後再生。`;
}

function log(msg,cls='li'){
  const el=document.getElementById('log');
  const d=document.createElement('div');d.className='ll '+cls;d.innerHTML=msg;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}
function logSep(){log('─'.repeat(32),'lp');}

// RENDER

function renderAll(){renderStats();renderInv();renderEq();renderRec();renderShelter();renderLocBar();}

function renderLocBar(){
  if(!G)return;
  const t=G.map[G.py][G.px];const td=TR[t];const cell=getCell();
  const pct=t==='river'?100:Math.max(0,cell.cur/cell.max*100);
  document.getElementById('loc-name').textContent=(td?.icon||'📍')+' '+td?.lb;
  document.getElementById('loc-coord').textContent=`(${G.px},${G.py})`;
  document.getElementById('loc-res-bar-inner').style.width=pct+'%';
  document.getElementById('loc-res-bar-inner').style.background=cellColor(cell,t);
  let label=cellLabel(cell,t);
  if(cell.cur<=0&&t!=='river'&&TR[t]?.regenDays>0)label=`${Math.max(1,cell.regenDay-G.day)}天後再生`;
  document.getElementById('loc-res-label').textContent=label;
}

function renderStats(){
  const s=G.s;
  const sb=(id,v)=>{
    document.getElementById('b-'+id).style.width=Math.max(0,Math.min(100,v))+'%';
    const el=document.getElementById('v-'+id);
    if(el)el.textContent=Math.round(v);
  };
  sb('hp',s.hp);sb('hun',s.hunger);sb('thi',s.thirst);sb('slp',s.sleep);
  const hh=String(G.hour).padStart(2,'0'),mm=String(G.minute).padStart(2,'0');
  const flags=G.infected?' [感染]':'';
  document.getElementById('datetime').textContent=`第${G.day}天  ${hh}:${mm}${flags}`;
  const wmap={clear:'☀ 晴天',rain:'🌧 下雨中',storm:'⛈ 熱帶暴雨',fog:'🌫 晨霧'};
  document.getElementById('weather-line').textContent=wmap[G.weather]||'☀ 晴天';
  const pct=G.shelterStage/5*100;
  document.getElementById('shelter-fill').style.width=pct+'%';
  document.getElementById('shelter-pct').textContent=Math.round(pct)+'%';
  document.getElementById('shelter-stage-name').textContent='避難所: '+(STAGES[G.shelterStage]?.name||'完成');
}

function renderInv(){
  const el=document.getElementById('inv-grid');
  const items=Object.entries(G.inv).filter(([,v])=>v>0);
  if(!items.length){el.innerHTML='<div style="color:var(--tx);font-size:13px;padding:6px">背包是空的</div>';return;}
  el.innerHTML=items.map(([k,v])=>`<div class="inv-cell"><span class="ic-n">${k}</span><span class="ic-q">×${v}</span></div>`).join('');
}

function renderEq(){
  document.getElementById('eq-wrap').innerHTML=
    [['武器',G.equipped.weapon],['防具',G.equipped.armor],['ATK',getAtk()],['DEF',getDef()]]
    .map(([l,v])=>`<div class="eq-slot"><div class="eq-l">${l}</div><div class="eq-v">${v||'—'}</div></div>`).join('');
}

function renderRec(){
  document.getElementById('rec-list').innerHTML=Object.entries(RECIPES).map(([name,rec])=>{
    const can=Object.entries(rec.needs).every(([k,v])=>(G.inv[k]||0)>=v);
    const needs=Object.entries(rec.needs).map(([k,v])=>`${k}×${v}`).join(' ');
    return`<div class="ri">
      <span class="${can?'rc':'rn2'}">${can?'✓':'✗'}</span>
      <span class="rnm">${name}</span>
      <div class="ri-right">
        <span class="rnd">${needs}</span>
        <span class="rpu">${rec.purpose||''}</span>
      </div>
    </div>`;
  }).join('');
}

function renderShelter(){
  document.getElementById('shelter-detail').innerHTML=STAGES.map((st,i)=>{
    const done=G.shelterStage>i,next=G.shelterStage===i&&i>0;
    const cls=done?'sh-done':next?'sh-next':'sh-lock';
    const mark=done?'✓':next?'▶':'○';
    const content=done?(st.bonus||'完成')
      :i===0?'（起始狀態）'
      :Object.entries(st.needs).map(([k,v])=>`${k}×${v}(${Math.min(G.inv[k]||0,v)})`).join(' ');
    return`<div class="sh-stage"><span class="${cls}">${mark}</span><span class="sh-name ${cls}">${st.name}</span><span class="sh-need">${content}</span></div>`;
  }).join('');
}

function switchTab(name){
  ['inv','eq','rec','shlt'].forEach((n,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',n===name);
    document.getElementById('panel-'+n).classList.toggle('active',n===name);
  });
}

// ═══════════════════════════════════
// HELPERS
// ═══════════════════════════════════
function cl(v,mn=0,mx=100){return Math.max(mn,Math.min(mx,v));}
function addItem(k,v){if(G)G.inv[k]=(G.inv[k]||0)+v;}
function remItem(k,v){if(G)G.inv[k]=Math.max(0,(G.inv[k]||0)-v);}
function getAtk(){const w=G.equipped.weapon;return w&&RECIPES[w]?RECIPES[w].atk||2:2;}
function getDef(){const a=G.equipped.armor;return a&&RECIPES[a]?RECIPES[a].def||0:0;}

// ═══════════════════════════════════
// TICK
// ═══════════════════════════════════
function tick(mins=30){
  if(!G||G.dead||G.won)return;
  G.minute+=mins;
  while(G.minute>=60){G.minute-=60;G.hour++;}
  while(G.hour>=24){
    G.hour-=24;G.day++;
    regenResources();
    log(`── 第 ${G.day} 天 ──`,'lx');
    // 陷阱捕獵：生活設施後效率提升
    if(G.built.some(b=>b.type==='陷阱')){
      const chance=G.shelterStage>=4?0.6:0.4;
      if(Math.random()<chance){
        const prey=['野豬肉','獸皮','骨頭'][Math.floor(Math.random()*3)];
        addItem(prey,1);log(`陷阱捕到獵物！取得 ${prey}×1`,'ls');
      }
    }
    if(G.day>=30&&G.shelterStage>=5)doWin();
    else if(G.day>=30)log('救援直升機飛過但未發現你...完成求救信號台！','ld');
  }
  G.weatherTimer-=mins;
  if(G.weatherTimer<=0)doWeather();

  const night=G.hour<6||G.hour>=20;
  G.s.hunger=cl(G.s.hunger-2);
  G.s.thirst=cl(G.s.thirst-3);
  G.s.sleep=cl(G.s.sleep-(night?0:2));

  if(G.infected)G.s.hp=cl(G.s.hp-2);
  if(G.s.hunger<=0)G.s.hp=cl(G.s.hp-4);
  if(G.s.thirst<=0)G.s.hp=cl(G.s.hp-6);

  // 夜間獸襲：第3天後，第3階段前
  if(night&&G.day>=3&&G.shelterStage<3&&G.hour===2&&Math.random()<0.2){
    log('夜間野獸靠近！','ld');
    G.s.hp=cl(G.s.hp-12);
    if(Math.random()<0.24){G.infected=true;log('爪痕感染！','ld');}
  }

  G.tickN++;
  if(G.tickN%5===0)warnStats();
  if(G.s.hp<=0)doDeath();
}

function warnStats(){
  if(G.s.hunger<30)log('⚠ 飢餓警告','lw');
  if(G.s.thirst<25)log('⚠ 缺水警告','lw');
  if(G.s.sleep<20)log('⚠ 需要睡眠','lw');
  if(G.infected)log('⚠ 傷口感染中，需要治療','ld');
}

function doWeather(){
  const pool=['clear','clear','clear','rain','rain','storm','fog'];
  G.weather=pool[Math.floor(Math.random()*pool.length)];
  G.weatherTimer=60+Math.random()*120;
  const wm={clear:'天氣放晴了。',rain:'開始下雨，可收集雨水。',storm:'熱帶暴雨！',fog:'清晨濃霧，能見度低。'};
  log(wm[G.weather],G.weather==='clear'?'ls':G.weather==='fog'?'lm':'lw');
}

// ═══════════════════════════════════
// ACTIONS
// ═══════════════════════════════════
function descLoc(){
  const t=G.map[G.py][G.px];const td=TR[t];const cell=getCell();
  log(`[${td?.lb}] (${G.px},${G.py})  ${td?.desc||''}`, 'lm');
  if(t==='river'){log('可採集: 魚、石頭（無限）','lm');}
  else if(cell.cur<=0){log(`資源耗盡。${regenLabel(t,cell)}`,'ld');}
  else{
    const resNames=[...new Set(td?.res||[])].join('、');
    log(`可採集: ${resNames}（剩 ${cell.cur}/${cell.max}）`,'lm');
  }
  const here=G.built.filter(b=>b.x===G.px&&b.y===G.py);
  if(here.length)log(`設施: ${here.map(b=>b.type).join('、')}`,'ls');
}

function doMove(dir){
  const d=DIR_DELTA[dir];
  if(!d){log('方向錯誤，請輸入 n/s/e/w','lw');return;}
  const nx=G.px+d[0],ny=G.py+d[1];
  if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H){log('前方無路可走。','lw');return;}
  G.px=nx;G.py=ny;reveal(nx,ny,1);tick(30);G.s.stamina=cl((G.s.stamina||100)-5,0,100);
  log(`往${DIR_NAME[dir]}方移動了。(${G.px},${G.py})`,'lm');
  descLoc();renderAll();
}

function doExplore(){
  const t=G.map[G.py][G.px];const cell=getCell();const td=TR[t];
  if(t!=='river'&&cell.cur<=0){log(`此處資源耗盡。${regenLabel(t,cell)}`,'ld');return;}
  tick(30);
  const res=td?.res||[];
  if(res.length){
    const item=res[Math.floor(Math.random()*res.length)];
    const qty=1+Math.floor(Math.random()*2);
    addItem(item,qty);
    log(`在${td.lb}採集，獲得 <span style="color:#ffcc00">${item} ×${qty}</span>`,'li');
    if(Math.random()<0.3){
      const i2=res[Math.floor(Math.random()*res.length)];
      addItem(i2,1);log(`也發現了 ${i2} ×1`,'lm');
    }
    if(t!=='river'){
      cell.cur=Math.max(0,cell.cur-1);
      if(cell.cur===0){
        if(TR[t].regenDays>0)cell.regenDay=G.day+TR[t].regenDays;
        log(`${td.lb}資源已耗盡！${regenLabel(t,cell)}`,'lw');
      }else if(cell.cur<=Math.floor(cell.max*0.3)){
        log(`${td.lb}資源稀少（剩${cell.cur}）。`,'lw');
      }
    }
  }
  if(Math.random()<0.4)triggerEvent(t);
  renderAll();
}

function triggerEvent(terrain){
  const pool=EVENTS[terrain]||EVENTS.clear;
  const ev=pool[Math.floor(Math.random()*pool.length)];
  log('〔事件〕','lm');
  log(ev.msg,ev.type==='combat'?'ld':ev.type==='dmg'?'lw':'li');
  switch(ev.type){
    case 'item':addItem(ev.item,ev.qty);log(`取得: ${ev.item} ×${ev.qty}`,'ls');break;
    case 'craft_byproduct':
      addItem(ev.item,ev.qty);log(`取得: ${ev.item} ×${ev.qty}`,'ls');
      if(ev.byp)Object.entries(ev.byp).forEach(([k,v])=>{addItem(k,v);log(`副產物: ${k} ×${v}`,'lm');});break;
    case 'loot':
      Object.entries(ev.items).forEach(([k,v])=>addItem(k,v));
      log(`取得: ${Object.entries(ev.items).map(([k,v])=>k+'×'+v).join(', ')}`,'ls');break;
    case 'dmg':
      G.s.hp=cl(G.s.hp-ev.dmg);log(`受傷 -${ev.dmg} HP`,'lw');
      if((ev.infectChance||0)>0&&Math.random()<ev.infectChance){G.infected=true;log('傷口感染！','ld');}break;
    case 'stat':if(ev.stat&&G.s[ev.stat]!==undefined)G.s[ev.stat]=cl((G.s[ev.stat]||0)+ev.val);break;
    case 'combat':doCombat(ev);break;
    case 'npc':log(NPC_LINES[Math.floor(Math.random()*NPC_LINES.length)],'lx');break;
    case 'atm':break;
  }
}

function doCombat(ev){
  const atk=getAtk(),def=getDef();let eHp=ev.hp,rounds=0;
  while(eHp>0&&G.s.hp>0&&rounds<15){
    eHp-=atk+Math.floor(Math.random()*6);
    G.s.hp=cl(G.s.hp-Math.max(1,ev.atk-def+Math.floor(Math.random()*5)-2));
    rounds++;
  }
  if(G.s.hp>0&&eHp<=0){
    log(`擊敗了${ev.enemy}！`,'ls');
    if(ev.drop){Object.entries(ev.drop).forEach(([k,v])=>addItem(k,v));log(`戰利品: ${Object.entries(ev.drop).map(([k,v])=>k+'×'+v).join(', ')}`,'ls');}
  }else{
    log(`${ev.enemy}擊傷你，你勉強逃脫。HP: ${Math.round(G.s.hp)}`,'ld');
    if(Math.random()<0.24){G.infected=true;log('傷口感染！','ld');}
  }
}

function doCraft(item){
  if(!item){log('用法: c [物品名]  例: c 繩索','lw');return;}
  const rec=RECIPES[item];
  if(!rec){log(`不知道如何製作「${item}」，查看配方面板 (r)。`,'lw');return;}
  if(NEED_FIRE.has(item)&&!hasFire()){log(`製作「${item}」需要先在此處建造火堆。(c 火堆)`,'lw');return;}
  const miss=Object.entries(rec.needs).filter(([k,v])=>(G.inv[k]||0)<v).map(([k,v])=>`${k}(缺${v-(G.inv[k]||0)})`);
  if(miss.length){log(`材料不足: ${miss.join(', ')}`,'lw');return;}
  Object.entries(rec.needs).forEach(([k,v])=>remItem(k,v));
  Object.entries(rec.gives).forEach(([k,v])=>addItem(k,v));
  tick(60);
  log(`製作完成: <span style="color:#ffcc00">${item}</span> — ${rec.purpose||''}`,'ls');
  if(rec.type==='weapon'){G.equipped.weapon=item;log(`${item} 已裝備為武器。`,'ls');}
  else if(rec.type==='armor'){G.equipped.armor=item;log(`${item} 已裝備為防具。`,'ls');}
  else if(rec.type==='build'){G.built.push({x:G.px,y:G.py,type:item});log(`${item} 已建造於此處。`,'ls');}
  else if(rec.type==='food'){
    G.s.hunger=cl(G.s.hunger+(rec.hunger||30));
    if(rec.thirst)G.s.thirst=cl(G.s.thirst+rec.thirst);
    remItem(item,1);
  }
  renderAll();
}

function doBuild(stage){
  if(isNaN(stage)){log('用法: b [1-5]  例: b 1','lw');return;}
  if(stage!==G.shelterStage+1){log(`請先完成第${G.shelterStage+1}階段避難所。(sh 查看進度)`,'lw');return;}
  if(stage>5){log('避難所已完整建造！','ls');return;}
  const st=STAGES[stage];
  const miss=Object.entries(st.needs).filter(([k,v])=>(G.inv[k]||0)<v).map(([k,v])=>`${k}(缺${v-(G.inv[k]||0)})`);
  if(miss.length){log(`材料不足: ${miss.join(', ')}`,'lw');return;}
  Object.entries(st.needs).forEach(([k,v])=>remItem(k,v));
  G.shelterStage=stage;tick(120);
  logSep();
  log(`避難所升級 → ${st.name}`,'ls');
  log(`解鎖: ${st.bonus}`,'lo');
  logSep();
  if(stage===5&&G.day>=30)doWin();
  else if(stage===5)log('求救信號台完成！撐到第30天即可獲救。','lo');
  renderAll();
}

function doEat(item){
  if(!item){
    const a=Object.keys(EDIBLE).find(k=>(G.inv[k]||0)>0);
    if(!a){log('背包裡沒有食物。','lw');return;}
    item=a;
  }
  if(!(G.inv[item]>0)){log(`你沒有「${item}」。`,'lw');return;}
  const val=EDIBLE[item];
  if(!val){
    if(item==='蘑菇')log('生蘑菇有毒！先用火堆 c 蘑菇湯 再食用。','lw');
    else log(`「${item}」不是食物，試試 u ${item}。`,'lw');
    return;
  }
  G.s.hunger=cl(G.s.hunger+val.hunger);
  if(val.thirst)G.s.thirst=cl(G.s.thirst+val.thirst);
  const thirstMsg=val.thirst?`，口渴+${val.thirst}`:'';
  log(`吃了 ${item}，飢餓+${val.hunger}${thirstMsg}。`,'ls');
  remItem(item,1);tick(10);renderAll();
}

function doDrink(){
  if((G.inv['水']||0)>0){
    G.s.thirst=cl(G.s.thirst+50);remItem('水',1);log('你喝了水，口渴緩解。','ls');
  }else if(G.map[G.py][G.px]==='river'){
    addItem('水',2);G.s.thirst=cl(G.s.thirst+30);
    log('直接飲用河水（未淨化），有感染風險。','lw');
    if(Math.random()<0.2){G.infected=true;log('水源污染！腸胃感染。','ld');}
  }else if(G.weather==='rain'||G.weather==='storm'){
    addItem('水',1);G.s.thirst=cl(G.s.thirst+35);
    log('收集了雨水，口渴緩解。','ls');
  }else{
    log('附近沒有水源。前往河流取水，或下雨時收集。','lw');
    log('提示: 野果+8、香蕉+10、烤魚+10、蘑菇湯+25 也能補水。','lm');
  }
  tick(10);renderAll();
}

// 睡眠品質系統（無需避難所，但品質有差）
function doSleep(){
  const night=G.hour>=20||G.hour<6;
  const fire=hasFire();
  const shelter=hasShelter();
  log('你躺下休息...','lm');tick(480);
  let sleepGain,staminaGain,msg;
  if(shelter&&fire){sleepGain=80;staminaGain=60;msg='舒適睡眠，精神飽滿。';}
  else if(shelter)  {sleepGain=65;staminaGain=45;msg='在遮蔽下入睡，睡得還算好。';}
  else if(night)    {sleepGain=45;staminaGain=30;msg='野外露宿，睡眠品質較差。';}
  else              {sleepGain=20;staminaGain=15;msg='白天野外淺眠，幾乎沒有恢復。';}
  G.s.sleep=cl(G.s.sleep+sleepGain);
  log(msg,shelter?'ls':'lw');
  if(!shelter)log('提示: 建造避難所 (b 1) 可大幅提升睡眠品質。','lm');
  renderAll();
}

function doUse(item){
  if(!item){log('用法: u [物品]  例: u 蘆薈','lw');return;}
  if(!(G.inv[item]>0)){log(`你沒有「${item}」。`,'lw');return;}
  const fn=USABLE[item];
  if(!fn){log(`不知道如何使用「${item}」，也許可以 c 製作成其他東西？`,'lw');return;}
  const r=fn(G);if(r!==false)remItem(item,1);
  tick(10);renderAll();
}

function doDeath(){
  G.dead=true;logSep();
  log('你在叢林中倒下了。','ld');
  log(`存活了 ${G.day} 天，避難所第${G.shelterStage}階段。`,'lm');
  log('輸入 restart 重新開始。','lx');logSep();
}

function doWin(){
  if(G.won)return;G.won=true;
  showModal('獲救了！',
    `第 ${G.day} 天，救援直升機的聲音從天際傳來。\n\n你的求救信號台閃爍著光芒，\n引導飛機緩緩降落。\n\n你回頭看了一眼親手建造的避難所，\n踏上了回家的路。\n\n恭喜完成 JUNGLE！`
  );
}

function showModal(t,b){document.getElementById('mtitle').textContent=t;document.getElementById('mbody').innerHTML=b.replace(/\n/g,'<br>');document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');}

// ═══════════════════════════════════
// CMD PARSER
// ═══════════════════════════════════
const ALIASES={
  n:'go n',s:'go s',e:'go e',w:'go w',
  ex:'explore',l:'look',d:'drink',sl:'sleep',
  st:'status',sh:'shelter',wt:'wait',
  i:'inv',r:'rec','?':'help',h:'help',
};
const hist=[];let histI=-1;
function submitCmd(){const el=document.getElementById('inp');processCmd(el.value);el.value='';el.focus();}

function processCmd(raw){
  if(!raw.trim())return;
  let parts=raw.trim().split(/\s+/),cmd=parts[0].toLowerCase(),arg=parts.slice(1).join(' ');
  if(ALIASES[cmd]){const ex=ALIASES[cmd].split(' ');cmd=ex[0];if(ex[1]&&!arg)arg=ex[1];}
  if(cmd==='c'&&arg)cmd='craft';
  if(cmd==='b'&&arg)cmd='build';
  if(cmd==='u'&&arg)cmd='use';
  hist.unshift(raw);if(hist.length>40)hist.pop();histI=-1;
  log(`<span style="color:var(--td)">></span> ${raw}`,'lm');
  if(G?.dead||G?.won){
    if(cmd==='restart'||cmd==='new')restartGame();
    else log('遊戲已結束。輸入 restart 重新開始。','lm');
    return;
  }
  switch(cmd){
    case 'go':doMove(arg.toLowerCase());break;
    case 'look':tick(10);descLoc();renderAll();break;
    case 'explore':doExplore();break;
    case 'craft':doCraft(arg);break;
    case 'build':doBuild(parseInt(arg));break;
    case 'shelter':switchTab('shlt');log('查看避難所進度。','lm');break;
    case 'eat':doEat(arg||null);break;
    case 'drink':doDrink();break;
    case 'sleep':doSleep();break;
    case 'use':doUse(arg);break;
    case 'status':
      logSep();
      log(`HP:${Math.round(G.s.hp)} 飢餓:${Math.round(G.s.hunger)} 口渴:${Math.round(G.s.thirst)} 睡眠:${Math.round(G.s.sleep)}`,'li');
      log(`感染:${G.infected?'是':'否'} ATK:${getAtk()} DEF:${getDef()}`,'li');
      log(`位置:(${G.px},${G.py}) 第${G.day}天 避難所:${STAGES[G.shelterStage]?.name}`,'li');
      logSep();break;
    case 'wait':tick(60);log(`時間流逝... (${G.px},${G.py})`,'lm');renderAll();break;
    case 'inv':switchTab('inv');break;
    case 'eq':switchTab('eq');break;
    case 'rec':switchTab('rec');break;
    case 'help':
      logSep();log('─ 指令（短 / 完整）─','lx');
      [
        ['n s e w','go n/s/e/w','移動（北=y+，南=y−）'],
        ['ex','explore','探索採集（資源有限）'],
        ['l','look','查看地形與剩餘資源'],
        ['c [物品]','craft [物品]','製作物品'],
        ['b [1-5]','build [1-5]','升級避難所（主目標）'],
        ['eat [食物]','eat','吃東西（部分食物補水）'],
        ['d','drink','喝水'],
        ['sl','sleep','睡覺（無遮蔽品質較差）'],
        ['u [物品]','use [物品]','使用道具'],
        ['st','status','詳細狀態'],
        ['sh','shelter','避難所進度'],
        ['wt','wait','等待1小時'],
        ['i','inv','背包面板'],
        ['r','rec','配方面板'],
        ['?','help','說明'],
        ['','restart','重新開始'],
      ].forEach(([s,f,d])=>{
        const sc=s?`<span style="color:#39ff6e">${s}</span> / `:'       ';
        log(`${sc}<span style="color:#5a9a6a">${f}</span> — ${d}`,'li');
      });
      logSep();
      log('─ 素材地形對照 ─','lo');
      [
        ['原木、藤蔓、棕櫚葉、藥草、蘑菇','雨林 T'],
        ['竹子、樹皮','竹林 %'],
        ['石頭、燧石、骨頭','山坡 ^'],
        ['黏土、蘆薈','沼澤 *'],
        ['魚（無限）','河流 ~'],
        ['野果、香蕉','空地 .'],
        ['金屬碎片、電線、防水布','殘骸 #'],
      ].forEach(([items,terrain])=>log(`${items} → ${terrain}`,'lm'));
      logSep();
      log('─ 設施需求 ─','lo');
      log('需要火堆: 烤肉、烤魚、蘑菇湯','lm');
      logSep();
      log('─ 食物補水量 ─','lo');
      log('野果+8  香蕉+10  烤魚+10  蘑菇湯+25','lm');
      logSep();
      log('目標: b 1→5 完成求救信號台，第30天獲救！','lo');
      logSep();break;
    case 'restart':case 'new':restartGame();break;
    default:log(`未知指令「${cmd}」，輸入 ? 查看說明。`,'lw');
  }
}

function restartGame(){document.getElementById('log').innerHTML='';closeModal();newGame();}

document.addEventListener('DOMContentLoaded',()=>{
  const inp=document.getElementById('inp');
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter')submitCmd();
    else if(e.key==='ArrowUp'){e.preventDefault();if(histI<hist.length-1){histI++;inp.value=hist[histI]||'';}}
    else if(e.key==='ArrowDown'){e.preventDefault();if(histI>0){histI--;inp.value=hist[histI];}else{histI=-1;inp.value='';}}
  });
  document.addEventListener('click',e=>{
    if(!e.target.closest('#modal')&&!e.target.closest('#tabs')&&!e.target.closest('#inp-btn'))inp.focus();
  });
  newGame();
});
</script>
